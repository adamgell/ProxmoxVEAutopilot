name: Integration (self-hosted homelab)

# Runs the live --run-integration suite against a freshly-built release image,
# on the self-hosted homelab runner (gh-runner-01, CT 106 on pve1).
#
# SECURITY (public repo): this triggers ONLY via workflow_run after the image
# build succeeds, and the `if` below restricts it to push events (main + v*
# tags). Fork pull_request events never trigger it, so untrusted code never
# reaches the homelab runner.
on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]

concurrency:
  group: integration-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  integration:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: [self-hosted, homelab, integration]
    timeout-minutes: 25
    env:
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      VENV: /tmp/it-venv-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve image tag
        id: img
        # docker-publish tags every push image :<short-sha> (type=sha,prefix=).
        run: echo "tag=${HEAD_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Start ephemeral autopilot stack
        working-directory: autopilot-proxmox
        env:
          AUTOPILOT_IMAGE_TAG: ${{ steps.img.outputs.tag }}
        run: |
          set -euo pipefail
          # The CI checkout lacks the gitignored secrets file the compose mounts;
          # an empty vault means _load_vault() returns {} (no Proxmox config,
          # which the read-only suite tolerates).
          [ -s inventory/group_vars/all/vault.yml ] || printf -- '---\n' > inventory/group_vars/all/vault.yml
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            up -d --scale autopilot-builder=3 \
            autopilot autopilot-postgres autopilot-monitor autopilot-builder

      - name: Wait for /healthz
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -m 5 -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/healthz || true)
            if [ "$code" = "200" ]; then echo "healthz OK after ~$((i*2))s"; exit 0; fi
            sleep 2
          done
          echo "healthz never returned 200"
          (cd autopilot-proxmox && docker compose -f docker-compose.yml -f docker-compose.ci.yml logs autopilot | tail -80)
          exit 1

      - name: Run --run-integration suite
        working-directory: autopilot-proxmox
        env:
          AUTOPILOT_BASE_URL: http://127.0.0.1:5000
        run: |
          set -euo pipefail
          python3 -m venv "$VENV"
          "$VENV/bin/pip" install -q --upgrade pip
          "$VENV/bin/pip" install -q pytest requests cryptography
          "$VENV/bin/python" -m pytest tests/integration --run-integration -v

      - name: Teardown
        if: always()
        working-directory: autopilot-proxmox
        run: |
          echo "=== stack logs (tail) ==="
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --tail 40 2>&1 || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v 2>&1 || true
          rm -rf "$VENV" || true
