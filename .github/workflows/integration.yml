name: Integration (self-hosted homelab)

# Runs the live --run-integration suite against a freshly-built release image,
# on the self-hosted homelab runner (gh-runner-01, CT 106 on pve1).
#
# SECURITY (public repo): this triggers ONLY via workflow_run after the image
# build succeeds, and the `if` below restricts it to push events (main + v*
# tags). Fork pull_request events never trigger it, so untrusted code never
# reaches the homelab runner.
on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]

concurrency:
  group: integration-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  integration:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: [self-hosted, homelab, integration]
    timeout-minutes: 20
    env:
      IMAGE_BASE: ghcr.io/adamgell/proxmox-autopilot
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      PG_NAME: it-pg-${{ github.run_id }}
      WEB_NAME: it-web-${{ github.run_id }}
      VENV: /tmp/it-venv-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve image tag
        id: img
        run: echo "ref=${IMAGE_BASE}:${HEAD_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Start ephemeral autopilot (postgres + web, auth bypassed)
        run: |
          set -euo pipefail
          docker rm -f "$PG_NAME" "$WEB_NAME" >/dev/null 2>&1 || true
          docker run -d --name "$PG_NAME" --network host \
            -e POSTGRES_DB=autopilot -e POSTGRES_USER=autopilot -e POSTGRES_PASSWORD=autopilot-dev \
            postgres:16-alpine
          for i in $(seq 1 30); do
            docker exec "$PG_NAME" pg_isready -U autopilot -d autopilot >/dev/null 2>&1 && break
            sleep 1
          done
          docker pull "${{ steps.img.outputs.ref }}"
          docker run -d --name "$WEB_NAME" --network host \
            -e AUTOPILOT_AUTH_BYPASS=1 \
            -e AUTOPILOT_DATABASE_URL="host=127.0.0.1 port=5432 dbname=autopilot user=autopilot password=autopilot-dev" \
            "${{ steps.img.outputs.ref }}" web

      - name: Wait for /healthz
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -m 5 -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/healthz || true)
            if [ "$code" = "200" ]; then echo "healthz OK after ~$((i*2))s"; exit 0; fi
            sleep 2
          done
          echo "healthz never returned 200"; docker logs "$WEB_NAME" 2>&1 | tail -80; exit 1

      - name: Run --run-integration suite
        working-directory: autopilot-proxmox
        env:
          AUTOPILOT_BASE_URL: http://127.0.0.1:5000
        run: |
          set -euo pipefail
          python3 -m venv "$VENV"
          "$VENV/bin/pip" install -q --upgrade pip
          "$VENV/bin/pip" install -q pytest requests cryptography
          "$VENV/bin/python" -m pytest tests/integration --run-integration -v

      - name: Teardown
        if: always()
        run: |
          echo "=== web logs (tail) ==="; docker logs "$WEB_NAME" 2>&1 | tail -80 || true
          docker rm -f "$PG_NAME" "$WEB_NAME" >/dev/null 2>&1 || true
          rm -rf "$VENV" || true
