services:
  autopilot:
    image: ghcr.io/adamgell/proxmox-autopilot:latest
    container_name: autopilot
    network_mode: host
    volumes:
      - ./inventory/group_vars/all/vault.yml:/app/inventory/group_vars/all/vault.yml:ro
      - ./inventory/group_vars/all/vars.yml:/app/inventory/group_vars/all/vars.yml:ro
      - autopilot-data:/app/output
      - autopilot-jobs:/app/jobs
    security_opt:
      - apparmor=unconfined
    restart: unless-stopped

volumes:
  autopilot-data:
  autopilot-jobs:
