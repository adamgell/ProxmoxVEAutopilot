services:
  autopilot:
    image: ghcr.io/adamgell/proxmox-autopilot:${AUTOPILOT_IMAGE_TAG:-v2026.07.5}
    container_name: autopilot
    command: ["web"]
    network_mode: host
    volumes:
      # vault.yml is RW so the /settings page can rotate secrets from the
      # UI. Mode matches vars.yml; restrict the file on the host with
      # chmod 600 if stricter access is required.
      - ./inventory/group_vars/all/vault.yml:/app/inventory/group_vars/all/vault.yml
      - ./inventory/group_vars/all/vars.yml:/app/inventory/group_vars/all/vars.yml
      - ./output:/app/output
      - ./cache/cloudosd:/app/cache/cloudosd
      - ./cache/osdeploy:/app/cache/osdeploy
      - autopilot-jobs:/app/jobs
      - ./secrets:/app/secrets
      # Self-update: the footer's [Update] button POSTs to
      # /api/update/run, which spawns a short-lived sidecar
      # container via the host Docker socket to do `git pull` +
      # `docker compose up -d`. The sidecar needs the host repo
      # dir to git-pull + find the compose file.
      # These two mounts are web-only; builder/monitor don't need them.
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ProxmoxVEAutopilot:/host/repo
    security_opt:
      - apparmor=unconfined
    environment: &common_env
      # MD4 (NT hash) lives in OpenSSL's legacy provider in 3.x.
      # Required by python-ldap's NTLM fallback + any transient
      # kinit path that still ends up needing it.
      OPENSSL_CONF: /etc/ssl/openssl-legacy.cnf
      # Host repo path (available inside the container at
      # /host/repo via the bind mount). Used by /api/update/run
      # to tell the sidecar where to run git pull / compose.
      HOST_REPO_PATH: /opt/ProxmoxVEAutopilot
      # Task Sequence Engine v2 uses Postgres. Override
      # AUTOPILOT_POSTGRES_PASSWORD in production.
      AUTOPILOT_TS_ENGINE_DATABASE_URL: host=127.0.0.1 port=5432 dbname=autopilot user=autopilot password=${AUTOPILOT_POSTGRES_PASSWORD:-autopilot-dev}
      # SHA-256 hex digest of the fleet-scoped Ninja/retrofit bootstrap token.
      # Store only the hash in the host .env; Ninja sends the raw secure value.
      AUTOPILOT_AGENT_BOOTSTRAP_TOKEN_SHA256: ${AUTOPILOT_AGENT_BOOTSTRAP_TOKEN_SHA256:-}
      # LAN-reachable controller URL used by WinPE/CloudOSD/build-host agents.
      AUTOPILOT_BASE_URL: ${AUTOPILOT_BASE_URL:-http://127.0.0.1:5000}
      AUTOPILOT_CLOUDOSD_CACHE_ROOT: ${AUTOPILOT_CLOUDOSD_CACHE_ROOT:-/app/cache/cloudosd}
      AUTOPILOT_OSDEPLOY_CACHE_ROOT: ${AUTOPILOT_OSDEPLOY_CACHE_ROOT:-/app/cache/osdeploy}
      AUTOPILOT_SETUP_ARTIFACT_ROOT: ${AUTOPILOT_SETUP_ARTIFACT_ROOT:-/app/cache/osdeploy/setup-artifacts}
      # Auth provider mode: local for first-run/lab, entra for Microsoft OIDC,
      # auto to use Entra only when configured.
      AUTOPILOT_AUTH_MODE: ${AUTOPILOT_AUTH_MODE:-auto}
    depends_on:
      autopilot-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  autopilot-postgres:
    image: postgres:16-alpine
    container_name: autopilot-postgres
    ports:
      - "127.0.0.1:5432:5432"
    security_opt:
      - apparmor=unconfined
    environment:
      POSTGRES_DB: autopilot
      POSTGRES_USER: autopilot
      POSTGRES_PASSWORD: ${AUTOPILOT_POSTGRES_PASSWORD:-autopilot-dev}
    volumes:
      - autopilot-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autopilot -d autopilot && psql -U autopilot -d autopilot -tAc 'SELECT 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  autopilot-builder:
    image: ghcr.io/adamgell/proxmox-autopilot:${AUTOPILOT_IMAGE_TAG:-v2026.07.5}
    # No container_name: --scale spins up replicas which need auto-names.
    command: ["builder"]
    network_mode: host
    # Anchor lives here: the shared 5-mount set (no docker.sock, no /host/repo).
    volumes: &common_mounts
      - ./inventory/group_vars/all/vault.yml:/app/inventory/group_vars/all/vault.yml
      - ./inventory/group_vars/all/vars.yml:/app/inventory/group_vars/all/vars.yml
      - ./output:/app/output
      - ./cache/cloudosd:/app/cache/cloudosd
      - ./cache/osdeploy:/app/cache/osdeploy
      - autopilot-jobs:/app/jobs
      - ./secrets:/app/secrets
    security_opt:
      - apparmor=unconfined
    environment: *common_env
    depends_on:
      autopilot:
        condition: service_healthy
    restart: unless-stopped

  autopilot-monitor:
    image: ghcr.io/adamgell/proxmox-autopilot:${AUTOPILOT_IMAGE_TAG:-v2026.07.5}
    container_name: autopilot-monitor
    command: ["monitor"]
    network_mode: host
    volumes: *common_mounts
    security_opt:
      - apparmor=unconfined
    environment:
      <<: *common_env
      # Managed-lab network reconcile sweep (opt-in; both default off so the
      # monitor never mutates Proxmox SDN unless an operator enables it).
      # Set an interval in seconds to enable the scheduled fleet reconcile;
      # it stays propose-only until AUTO_APPLY is truthy. Also always available
      # on demand via POST /api/labs/reconcile-sweep[?auto_apply=true].
      AUTOPILOT_LAB_RECONCILE_INTERVAL_SECONDS: ${AUTOPILOT_LAB_RECONCILE_INTERVAL_SECONDS:-0}
      AUTOPILOT_LAB_RECONCILE_AUTO_APPLY: ${AUTOPILOT_LAB_RECONCILE_AUTO_APPLY:-}
    depends_on:
      autopilot:
        condition: service_healthy
    restart: unless-stopped

  autopilot-mcp:
    image: ghcr.io/adamgell/proxmox-autopilot:${AUTOPILOT_IMAGE_TAG:-v2026.07.5}
    container_name: autopilot-mcp
    command: ["mcp"]
    network_mode: host
    volumes:
      - ./inventory/group_vars/all/vault.yml:/app/inventory/group_vars/all/vault.yml
      - ./inventory/group_vars/all/vars.yml:/app/inventory/group_vars/all/vars.yml
      - ./output:/app/output
      - ./cache/cloudosd:/app/cache/cloudosd
      - ./cache/osdeploy:/app/cache/osdeploy
      - autopilot-jobs:/app/jobs
      - ./secrets:/app/secrets
      - ..:/repo:ro
    security_opt:
      - apparmor=unconfined
    environment:
      <<: *common_env
      AUTOPILOT_MCP_TOKEN: ${AUTOPILOT_MCP_TOKEN:-}
      AUTOPILOT_MCP_HOST: ${AUTOPILOT_MCP_HOST:-127.0.0.1}
      AUTOPILOT_MCP_PORT: ${AUTOPILOT_MCP_PORT:-5050}
      AUTOPILOT_MCP_ALLOWED_ORIGINS: ${AUTOPILOT_MCP_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:15051,http://127.0.0.1:15051}
      AUTOPILOT_MCP_DOC_ROOTS: ${AUTOPILOT_MCP_DOC_ROOTS:-/repo/README.md,/repo/AGENTS.md,/repo/CLAUDE.md,/repo/.github/copilot-instructions.md,/repo/docs,/repo/tools/winpe-build/README.md,/repo/tools/cloudosd-build,/repo/tools/osdeploy-build,/repo/autopilot-proxmox/README.md,/repo/autopilot-proxmox/MIGRATION-microservice-split.md,/repo/autopilot-proxmox/tools/cloudosd-build,/repo/autopilot-proxmox/tools/osdeploy-build}
    depends_on:
      autopilot-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 5050), 3); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  autopilot-jobs:
  autopilot-postgres:
