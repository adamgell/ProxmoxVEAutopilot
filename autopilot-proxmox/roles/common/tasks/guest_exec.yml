---
# Dispatch hub for guest command execution.
# Routes to backend-specific implementation based on hypervisor_type.
# Expands to _proxmox_guest_exec.yml or _utm_guest_exec.yml.
#
# Required variables:
#   vm_vmid          - target VM ID (Proxmox VMID or VM name for UTM)
#   _exec_command    - list of command + args, e.g. ["cmd.exe", "/c", "dir"]
#
# Uses:
#   hypervisor_type  - "proxmox" (default) or "utm" — from group_vars/all/vars.yml,
#                      overridable via -e hypervisor_type=... on the command line.
#
# Optional overrides:
#   _exec_timeout    - seconds to wait (default: guest_exec_timeout_seconds)
#   _exec_poll       - poll interval (default: guest_exec_poll_interval_seconds)
#
# Registers:
#   _guest_exec_result  - the exec response (structure varies by backend)
#   _guest_exec_status  - the final exec-status response

- name: "Execute command via {{ hypervisor_type | default('proxmox') }} backend"
  ansible.builtin.include_tasks: >-
    {{
      (
        (role_path ~ '/../common/tasks/')
        if (role_path is defined)
        else (playbook_dir ~ '/../roles/common/tasks/')
      )
      ~ '_'
      ~ (
        'proxmox'
        if ((hypervisor_type | default('proxmox')) in ['proxmox', 'pve'])
        else (hypervisor_type | default('proxmox'))
      )
      ~ '_guest_exec.yml'
    }}
