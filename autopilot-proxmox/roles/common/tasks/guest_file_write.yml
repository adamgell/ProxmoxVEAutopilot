---
# Dispatch hub for writing a file into a guest VM.
# Routes to _{proxmox,utm}_guest_file_write.yml based on hypervisor_type.
#
# Required variables:
#   vm_vmid        - target VM ID
#   _guest_file    - full path inside the guest
#   _guest_content - file content to write

- name: "Write file via {{ hypervisor_type | default('proxmox') }} backend"
  ansible.builtin.include_tasks: "_{{ hypervisor_type | default('proxmox') }}_guest_file_write.yml"
