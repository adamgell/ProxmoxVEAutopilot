---
# Orchestrator: clone a VM from a Proxmox template and reconfigure it.
# Mirrors New-ProxmoxCloneDevice.ps1 logic.

- name: Load OEM profiles
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../files/oem_profiles.yml"
    name: _oem_data

- name: Resolve OEM profile
  when: vm_oem_profile is defined and vm_oem_profile | default('') | length > 0
  block:
    - name: Look up selected OEM profile
      ansible.builtin.set_fact:
        _oem_profile: "{{ _oem_data.oem_profiles[vm_oem_profile] }}"

# Resolve effective chassis type in two steps so we never reference
# _oem_profile.chassis_type when _oem_profile is undefined (which
# triggers AnsibleUndefinedVariable). The form override runs second
# so it wins when both sources supply a value.
- name: Resolve effective chassis type (from OEM profile)
  ansible.builtin.set_fact:
    _effective_chassis_type: "{{ _oem_profile.chassis_type }}"
  when:
    - _oem_profile is defined
    - _oem_profile.chassis_type is defined
    - (_oem_profile.chassis_type | int) > 0

- name: Resolve effective chassis type (form override wins)
  ansible.builtin.set_fact:
    _effective_chassis_type: "{{ chassis_type_override }}"
  when:
    - chassis_type_override is defined
    - (chassis_type_override | int) > 0

- name: Build QEMU -smbios file= args for chassis type
  ansible.builtin.set_fact:
    _smbios_args: >-
      -smbios file=/var/lib/vz/snippets/autopilot-chassis-type-{{ _effective_chassis_type }}.bin
  when:
    - _effective_chassis_type is defined
    - (_effective_chassis_type | int) > 0

- name: Get next available VMID
  ansible.builtin.uri:
    url: "{{ proxmox_api_base }}/cluster/nextid"
    method: GET
    headers:
      Authorization: "{{ proxmox_api_auth_header }}"
    validate_certs: "{{ proxmox_validate_certs }}"
  register: _nextid_result

- name: Set VM ID and name
  ansible.builtin.set_fact:
    vm_vmid: "{{ _nextid_result.json.data }}"
    vm_name: "{{ vm_name_prefix }}-{{ _nextid_result.json.data }}"

- name: Generate VM identity
  ansible.builtin.set_fact:
    _vm_identity: "{{ vm_vmid | generate_vm_identity }}"

- name: Generate serial number
  ansible.builtin.set_fact:
    _vm_serial: >-
      {{ (_oem_profile.manufacturer | default(''))
         | generate_serial_number(custom_serial=vm_custom_serial | default(None),
                                  prefix=vm_serial_prefix | default(None)) }}

- name: Update VM name to serial
  ansible.builtin.set_fact:
    vm_name: "{{ _vm_serial | regex_replace('[^A-Za-z0-9\\-]', '') }}"
  when: _vm_serial is defined and _vm_serial | length > 0

- name: Build SMBIOS1 string
  ansible.builtin.set_fact:
    _smbios1_string: >-
      {{ {
           'manufacturer': _oem_profile.manufacturer | default(''),
           'product': _oem_profile.product | default(''),
           'family': _oem_profile.family | default(''),
           'serial': _vm_serial,
           'sku': _oem_profile.sku | default(''),
           'uuid': _vm_identity.uuid
         } | proxmox_smbios1 }}
  when: _oem_profile is defined or _vm_identity.uuid is defined

- name: Set SMBIOS1 to UUID-only when no OEM profile
  ansible.builtin.set_fact:
    _smbios1_string: "uuid={{ _vm_identity.uuid }}"
  when: _oem_profile is not defined and _vm_identity.uuid is defined and _smbios1_string is not defined

- name: Clone VM from template
  ansible.builtin.include_tasks: clone_vm.yml

- name: Wait for clone task
  ansible.builtin.include_tasks: "{{ role_path }}/../common/tasks/wait_task.yml"
  vars:
    _task_upid: "{{ _clone_result.json.data }}"

- name: Read current cloned VM config
  ansible.builtin.uri:
    url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/config"
    method: GET
    headers:
      Authorization: "{{ proxmox_api_auth_header }}"
    validate_certs: "{{ proxmox_validate_certs }}"
  register: _clone_config

- name: Extract current scsi0 config
  ansible.builtin.set_fact:
    _current_scsi0: "{{ _clone_config.json.data.scsi0 }}"

- name: Fail if cloned VM has no scsi0 disk
  ansible.builtin.fail:
    msg: "Cloned VM {{ vm_name }} (VMID: {{ vm_vmid }}) has no scsi0 disk."
  when: not _current_scsi0

- name: Update cloned VM configuration
  ansible.builtin.include_tasks: update_config.yml

- name: Resize disk if needed
  ansible.builtin.include_tasks: resize_disk.yml
  when: vm_disk_size_gb is defined and vm_disk_size_gb | int > 0

# Resolve the clone's scsi0 volid for the offline unattend injection
# below. _current_scsi0 holds the full config-line (volid + options);
# we only want the volid (before the first comma).
- name: Extract clone scsi0 volid for unattend injection
  ansible.builtin.set_fact:
    _clone_scsi0_volid: "{{ (_current_scsi0 | default('')).split(',')[0] }}"

# Offline-write the per-VM autounattend.xml into C:\Windows\Panther\
# unattend.xml. Only fires when a sequence compiled an answer payload
# (i.e., a non-default provision). Windows sysprep-online-specialize
# skips removable-media scanning; Panther (position 3) is the only
# location it honors, and a fresh file there is processed cleanly.
- name: Inject per-VM unattend.xml into clone Panther
  ansible.builtin.include_tasks: inject_unattend.yml
  when: _answer_floppy_path is defined and _answer_floppy_path | default('') | length > 0

- name: Start VM
  ansible.builtin.uri:
    url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/status/start"
    method: POST
    headers:
      Authorization: "{{ proxmox_api_auth_header }}"
    validate_certs: "{{ proxmox_validate_certs }}"
  when: vm_start_after_create | default(true) | bool

# Sequence-compiled steps that trigger a Windows-side reboot (e.g.,
# rename_computer) bump _causes_reboot_count. For each expected reboot,
# wait for the agent to drop and come back so later tasks (hash capture,
# domain health checks) see the guest in its final state.
- name: "Follow guest through {{ _causes_reboot_count }} reboot(s)"
  ansible.builtin.include_tasks: "{{ role_path }}/../common/tasks/wait_reboot_cycle.yml"
  loop: "{{ range(0, _causes_reboot_count | default(0) | int) | list }}"
  loop_control:
    loop_var: _reboot_idx
  when:
    - vm_start_after_create | default(true) | bool
    - (_causes_reboot_count | default(0) | int) > 0

- name: Report cloned VM
  ansible.builtin.debug:
    msg: >-
      Cloned VM '{{ vm_name }}' (VMID: {{ vm_vmid }}) from template
      {{ proxmox_template_vmid }}. UUID: {{ _vm_identity.uuid }},
      Disk Serial: {{ _vm_identity.disk_serial }}
