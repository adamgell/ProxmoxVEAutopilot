---
# Orchestrator: clone a VM from a Proxmox template and reconfigure it.
# Mirrors New-ProxmoxCloneDevice.ps1 logic.

- name: Load OEM profiles
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../files/oem_profiles.yml"
    name: _oem_data

- name: Resolve OEM profile
  when: vm_oem_profile is defined and vm_oem_profile | default('') | length > 0
  block:
    - name: Look up selected OEM profile
      ansible.builtin.set_fact:
        _oem_profile: "{{ _oem_data.oem_profiles[vm_oem_profile] }}"

    - name: Warn about unsupported chassis type
      ansible.builtin.debug:
        msg: >-
          WARNING: Chassis type {{ _oem_profile.chassis_type }} skipped —
          Proxmox 9 does not support smbios2.
      when: _oem_profile.chassis_type is defined

- name: Get next available VMID
  ansible.builtin.uri:
    url: "{{ proxmox_api_base }}/cluster/nextid"
    method: GET
    headers:
      Authorization: "{{ proxmox_api_auth_header }}"
    validate_certs: "{{ proxmox_validate_certs }}"
  register: _nextid_result

- name: Set VM ID and name
  ansible.builtin.set_fact:
    vm_vmid: "{{ _nextid_result.json.data }}"
    vm_name: "{{ vm_name_prefix }}-{{ _nextid_result.json.data }}"

- name: Generate VM identity
  ansible.builtin.set_fact:
    _vm_identity: "{{ vm_vmid | generate_vm_identity }}"

- name: Generate serial number
  ansible.builtin.set_fact:
    _vm_serial: >-
      {{ (_oem_profile.manufacturer | default(''))
         | generate_serial_number(custom_serial=vm_custom_serial | default(None),
                                  prefix=vm_serial_prefix | default(None)) }}

- name: Update VM name to serial
  ansible.builtin.set_fact:
    vm_name: "{{ _vm_serial | regex_replace('[^A-Za-z0-9\\-]', '') }}"
  when: _vm_serial is defined and _vm_serial | length > 0

- name: Build SMBIOS1 string
  ansible.builtin.set_fact:
    _smbios1_string: >-
      {{ {
           'manufacturer': _oem_profile.manufacturer | default(''),
           'product': _oem_profile.product | default(''),
           'family': _oem_profile.family | default(''),
           'serial': _vm_serial,
           'sku': _oem_profile.sku | default(''),
           'uuid': _vm_identity.uuid
         } | proxmox_smbios1 }}
  when: _oem_profile is defined or _vm_identity.uuid is defined

- name: Set SMBIOS1 to UUID-only when no OEM profile
  ansible.builtin.set_fact:
    _smbios1_string: "uuid={{ _vm_identity.uuid }}"
  when: _oem_profile is not defined and _vm_identity.uuid is defined and _smbios1_string is not defined

- name: Clone VM from template
  ansible.builtin.include_tasks: clone_vm.yml

- name: Wait for clone task
  ansible.builtin.include_tasks: "{{ role_path }}/../common/tasks/wait_task.yml"
  vars:
    _task_upid: "{{ _clone_result.json.data }}"

- name: Read current cloned VM config
  ansible.builtin.uri:
    url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/config"
    method: GET
    headers:
      Authorization: "{{ proxmox_api_auth_header }}"
    validate_certs: "{{ proxmox_validate_certs }}"
  register: _clone_config

- name: Extract current scsi0 config
  ansible.builtin.set_fact:
    _current_scsi0: "{{ _clone_config.json.data.scsi0 }}"

- name: Fail if cloned VM has no scsi0 disk
  ansible.builtin.fail:
    msg: "Cloned VM {{ vm_name }} (VMID: {{ vm_vmid }}) has no scsi0 disk."
  when: not _current_scsi0

- name: Update cloned VM configuration
  ansible.builtin.include_tasks: update_config.yml

- name: Resize disk if needed
  ansible.builtin.include_tasks: resize_disk.yml
  when: vm_disk_size_gb is defined and vm_disk_size_gb | int > 0

- name: Start VM
  ansible.builtin.uri:
    url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/status/start"
    method: POST
    headers:
      Authorization: "{{ proxmox_api_auth_header }}"
    validate_certs: "{{ proxmox_validate_certs }}"
  when: vm_start_after_create | default(true) | bool

- name: Report cloned VM
  ansible.builtin.debug:
    msg: >-
      Cloned VM '{{ vm_name }}' (VMID: {{ vm_vmid }}) from template
      {{ proxmox_template_vmid }}. UUID: {{ _vm_identity.uuid }},
      Disk Serial: {{ _vm_identity.disk_serial }}
