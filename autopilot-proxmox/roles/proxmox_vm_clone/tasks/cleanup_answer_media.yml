---
# Detach the template's baked-in sata0 CD-ROM from the clone after
# provisioning finishes. Windows has consumed the unattend from Panther
# (injected offline by inject_unattend.yml) and the sata0 ISO — a
# leftover from the template build — is no longer needed.

- name: "Read final VM config for cleanup on {{ vm_vmid }}"
  ansible.builtin.uri:
    url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/config"
    method: GET
    headers:
      Authorization: "{{ proxmox_api_auth_header }}"
    validate_certs: "{{ proxmox_validate_certs }}"
  register: _cleanup_config

- name: "Detach sata0 (template answer CD-ROM) from VM {{ vm_vmid }}"
  ansible.builtin.uri:
    url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/config"
    method: PUT
    body_format: form-urlencoded
    body:
      delete: "sata0"
    headers:
      Authorization: "{{ proxmox_api_auth_header }}"
    validate_certs: "{{ proxmox_validate_certs }}"
    status_code: [200]
  when: (_cleanup_config.json.data.sata0 | default('')) | length > 0
