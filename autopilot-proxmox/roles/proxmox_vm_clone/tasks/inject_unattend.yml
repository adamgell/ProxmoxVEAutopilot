---
# Offline-inject the per-VM autounattend.xml into the clone's
# C:\Windows\Panther\unattend.xml before first boot.
#
# Windows 11 25H2's online specialize pass (which runs on sysprep-d
# clones) does NOT search removable media — setupact.log shows:
#   Skipping offline-capable module of Microsoft-Windows-Setup-Unattend
#   when running online
# CDs (sata0) and floppies (-drive if=floppy) are both ignored. The
# only answer-file location Windows consults in that pass is
# C:\Windows\Panther. Writing a fresh per-VM file there (no
# wcm:action="processed" annotation) forces Windows to re-process the
# specialize and oobeSystem settings cleanly.
#
# SSH to the Proxmox host as root (sshpass + vault_proxmox_root_password,
# the same credential used for the /access/ticket flow), extract
# Autounattend.xml from the cached .img with mcopy, then guestfish-
# upload it onto the clone NTFS disk. ntfsfix clears any dirty bits
# sysprep may have left on the parent template's filesystem.
#
# Prereqs on the Proxmox host: libguestfs-tools + mtools + ntfs-3g.

- name: "Build the remote-inject command as a single line"
  ansible.builtin.set_fact:
    _inject_remote_cmd: >-
      set -eu;
      DISK="$(pvesm path {{ _clone_scsi0_volid }})";
      if [ -z "$DISK" ]; then echo no-disk-path >&2; exit 1; fi;
      TMP=$(mktemp -d);
      trap 'rm -rf "$TMP"' EXIT;
      mcopy -i {{ _answer_floppy_path | quote }} ::Autounattend.xml "$TMP/unattend.xml";
      ntfsfix -d "${DISK}-part4" >/dev/null 2>&1 || true;
      guestfish --rw -a "$DISK" -- run : mount-options rw /dev/sda4 / : mkdir-p /Windows/Panther : upload "$TMP/unattend.xml" /Windows/Panther/unattend.xml;
      echo INJECTED

- name: "Inject per-VM unattend.xml into clone {{ vm_vmid }} Panther"
  ansible.builtin.command:
    argv:
      - sshpass
      - -e
      - ssh
      - -o
      - StrictHostKeyChecking=no
      - -o
      - UserKnownHostsFile=/dev/null
      - -o
      - LogLevel=ERROR
      - "root@{{ proxmox_host }}"
      - "{{ _inject_remote_cmd }}"
  environment:
    SSHPASS: "{{ vault_proxmox_root_password }}"
  delegate_to: localhost
  register: _panther_inject
  changed_when: true
  failed_when: _panther_inject.rc != 0 or 'INJECTED' not in (_panther_inject.stdout | default(''))
