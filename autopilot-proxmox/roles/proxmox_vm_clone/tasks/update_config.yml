---
# Update the cloned VM configuration with APHVTools settings.
# Retries on lock contention (mirrors PowerShell maxConfigAttempts=6, 5s delay).

- name: Build config update body
  ansible.builtin.set_fact:
    _config_body:
      name: "{{ _vm_serial | default(vm_name) | regex_replace('[^A-Za-z0-9\\-]', '') }}"
      cores: "{{ vm_cores }}"
      memory: "{{ vm_memory_mb }}"
      cpu: "host"
      balloon: "0"
      agent: "enabled=1,type=virtio"
      scsi0: "{{ _current_scsi0 | proxmox_disk_serial(_vm_identity.disk_serial) }}"
      net0: "virtio,bridge={{ proxmox_bridge }},firewall=0{{ ',tag=' + (proxmox_vlan_tag | string) if proxmox_vlan_tag else '' }}"
      tags: "autopilot"

- name: Add SMBIOS1 to config
  ansible.builtin.set_fact:
    _config_body: "{{ _config_body | combine({'smbios1': _smbios1_string}) }}"
  when: _smbios1_string is defined and _smbios1_string | default('') | length > 0

- name: Add VirtIO ISO to config
  ansible.builtin.set_fact:
    _config_body: "{{ _config_body | combine({'ide3': proxmox_virtio_iso + ',media=cdrom'}) }}"
  when: proxmox_virtio_iso is defined and proxmox_virtio_iso | default('') | length > 0

- name: Update cloned VM configuration with lock-contention retry
  ansible.builtin.uri:
    url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/config"
    method: PUT
    body_format: form-urlencoded
    body: "{{ _config_body }}"
    headers:
      Authorization: "{{ proxmox_api_auth_header }}"
    validate_certs: "{{ proxmox_validate_certs }}"
    status_code: [200]
  register: _config_result
  retries: "{{ clone_config_retries | default(6) }}"
  delay: "{{ clone_config_delay | default(5) }}"
  until: _config_result.status == 200

# 'args' is hardcoded to root@pam in PVE::API2::Qemu::check_vm_modify_config_perm
# (it's passed straight to QEMU and can expose host resources). We do this
# update as a separate PUT with a root@pam API token. The web handler has
# already preflighted that the token is configured, so an auth failure here
# is genuinely wrong credentials rather than a missing-config case.
- name: Apply SMBIOS args via root@pam token (required for chassis-type override)
  when: _smbios_args is defined and _smbios_args | length > 0
  block:
    - name: Build merged args string (preserve any existing args on the clone)
      ansible.builtin.set_fact:
        _merged_args: >-
          {{ ((_clone_config.json.data.args | default('')) ~ ' ' ~ _smbios_args) | trim }}

    - name: Update args field via root token
      ansible.builtin.uri:
        url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/config"
        method: PUT
        body_format: form-urlencoded
        body:
          args: "{{ _merged_args }}"
        headers:
          Authorization: "{{ proxmox_root_api_auth_header }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]
      register: _args_result
      retries: "{{ clone_config_retries | default(6) }}"
      delay: "{{ clone_config_delay | default(5) }}"
      until: _args_result.status == 200
