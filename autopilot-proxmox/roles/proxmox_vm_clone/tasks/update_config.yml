---
# Update the cloned VM configuration with APHVTools settings.
# Retries on lock contention (mirrors PowerShell maxConfigAttempts=6, 5s delay).

- name: Build config update body
  ansible.builtin.set_fact:
    _config_body:
      name: "{{ _vm_serial | default(vm_name) | regex_replace('[^A-Za-z0-9\\-]', '') }}"
      cores: "{{ vm_cores }}"
      memory: "{{ vm_memory_mb }}"
      cpu: "host"
      balloon: "0"
      agent: "enabled=1,type=virtio"
      scsi0: "{{ _current_scsi0 | proxmox_disk_serial(_vm_identity.disk_serial) }}"
      net0: "virtio,bridge={{ proxmox_bridge }},firewall=0{{ ',tag=' + (proxmox_vlan_tag | string) if proxmox_vlan_tag else '' }}"
      tags: "autopilot"

# smbios1 stays the legacy path. When the per-VM SMBIOS file is in
# play (chassis-type override branch) this MUST be skipped — the file
# already provides Type 1, and combining `-smbios type=1,...` with
# `-smbios file=<full-smbios>` causes QEMU to drop our file's Type 1
# in favor of its own Bochs defaults.
- name: Add SMBIOS1 to config (legacy path, when no per-VM SMBIOS file)
  ansible.builtin.set_fact:
    _config_body: "{{ _config_body | combine({'smbios1': _smbios1_string}) }}"
  when:
    - _smbios1_string is defined
    - _smbios1_string | default('') | length > 0
    - not (_use_per_vm_smbios_file | default(false) | bool)

- name: Add VirtIO ISO to config
  ansible.builtin.set_fact:
    _config_body: "{{ _config_body | combine({'ide3': proxmox_virtio_iso + ',media=cdrom'}) }}"
  when: proxmox_virtio_iso is defined and proxmox_virtio_iso | default('') | length > 0

- name: Update cloned VM configuration with lock-contention retry
  ansible.builtin.uri:
    url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/config"
    method: PUT
    body_format: form-urlencoded
    body: "{{ _config_body }}"
    headers:
      Authorization: "{{ proxmox_api_auth_header }}"
    validate_certs: "{{ proxmox_validate_certs }}"
    status_code: [200]
  register: _config_result
  retries: "{{ clone_config_retries | default(6) }}"
  delay: "{{ clone_config_delay | default(5) }}"
  until: _config_result.status == 200

# QEMU 'args' is hardcoded to root@pam in Proxmox
# (PVE::API2::Qemu::check_vm_modify_config_perm is a literal eq match
# against the authuser — API tokens never satisfy it). Build the full
# args string on the controller, then PUT it once via a /access/ticket
# cookie. Two contributors may want args set:
#
#   _smbios_args         -smbios file=/var/lib/vz/snippets/chassis.bin
#   _answer_floppy_path  /var/lib/vz/snippets/autopilot-unattend-<hash>.img
#
# The floppy drive is the per-VM delivery vehicle for autounattend.xml
# on sysprep-d clones: Windows Setup's answer-file search lands on
# removable R/W media (position 4) before falling through to
# Sysprep\unattend (6) or SystemDrive (7). A CD at position 5 is
# routinely ignored when sysprep's online specialize is running.
- name: Compute the merged args string
  ansible.builtin.set_fact:
    # Only chassis -smbios contributes to args. We originally tried
    # attaching the per-VM answer file as a floppy here, but Windows 11
    # 25H2's online specialize skips the Microsoft-Windows-Setup-Unattend
    # module entirely, so CD+floppy drives are never scanned. The
    # unattend is instead injected directly into the clone's
    # C:\Windows\Panther\unattend.xml by inject_unattend.yml, which
    # gets picked up by position 3 of the answer-file search chain.
    _args_tokens: >-
      {{ ([
           (_clone_config.json.data.args | default('') | trim),
           (_smbios_args | default('') | trim),
         ] | reject('equalto', '') | list) }}

- name: Assemble args value
  ansible.builtin.set_fact:
    _merged_args: "{{ _args_tokens | join(' ') }}"

- name: Apply args via root@pam ticket
  ansible.builtin.uri:
    url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/config"
    method: PUT
    body_format: form-urlencoded
    body:
      args: "{{ _merged_args }}"
    headers:
      Cookie: "PVEAuthCookie={{ _proxmox_root_ticket }}"
      CSRFPreventionToken: "{{ _proxmox_root_csrf_token }}"
    validate_certs: "{{ proxmox_validate_certs }}"
    status_code: [200]
  register: _args_result
  retries: "{{ clone_config_retries | default(6) }}"
  delay: "{{ clone_config_delay | default(5) }}"
  until: _args_result.status == 200
  no_log: true
  when: _merged_args | default('') | length > 0
