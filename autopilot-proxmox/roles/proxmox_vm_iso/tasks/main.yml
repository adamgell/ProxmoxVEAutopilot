---
# Orchestrator: create a Windows VM from ISO with UEFI/Q35/VirtIO/vTPM/SMBIOS.
# Sets facts: vm_vmid, vm_name, _vm_identity, _smbios1_string

- name: Get next available VMID
  ansible.builtin.uri:
    url: "{{ proxmox_api_base }}/cluster/nextid"
    method: GET
    headers:
      Authorization: "{{ proxmox_api_auth_header }}"
    validate_certs: "{{ proxmox_validate_certs }}"
  register: _nextid_result

- name: Set VM ID and name
  ansible.builtin.set_fact:
    vm_vmid: "{{ _nextid_result.json.data }}"
    vm_name: "{{ vm_name_prefix }}-{{ _nextid_result.json.data }}"

- name: Load OEM profile + compute identity
  ansible.builtin.include_role:
    name: oem_profile_resolver

- name: Create VM from ISO
  ansible.builtin.include_tasks: create_vm.yml

- name: Wait for creation task
  ansible.builtin.include_tasks: "{{ role_path }}/../common/tasks/wait_task.yml"
  vars:
    _task_upid: "{{ _create_result.json.data }}"

- name: Start VM
  ansible.builtin.uri:
    url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/status/start"
    method: POST
    headers:
      Authorization: "{{ proxmox_api_auth_header }}"
    validate_certs: "{{ proxmox_validate_certs }}"
  when: vm_start_after_create | default(true) | bool

- name: Report created VM
  ansible.builtin.debug:
    msg: >-
      Created VM '{{ vm_name }}' (VMID: {{ vm_vmid }},
      UUID: {{ _vm_identity.uuid }},
      Disk Serial: {{ _vm_identity.disk_serial }})
