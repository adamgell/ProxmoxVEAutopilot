---
- name: "UTM clone source then dest, runtime: {{ utm_template_vm_name }} {{ vm_name }}"
  ansible.builtin.command:
    argv:
      - "{{ utm_utmctl_path }}"
      - clone
      - "{{ utm_template_vm_name }}"
      - --name
      - "{{ vm_name }}"
  register: _clone_result
  # utmctl returns rc=0 even on semantic errors (e.g. "source VM must
  # be stopped", OSStatus -2700). The real signal is on stderr. Any
  # non-empty stderr means something went wrong.
  failed_when:
    - _clone_result.rc != 0
      or (_clone_result.stderr | default('') | length) > 0
  changed_when: _clone_result.rc == 0

- name: "UTM clone: adopt vm_name as vm_vmid for downstream common tasks"
  ansible.builtin.set_fact:
    vm_vmid: "{{ vm_name }}"

- name: "UTM clone: verify new VM shows up in `utmctl list`"
  ansible.builtin.command:
    argv:
      - "{{ utm_utmctl_path }}"
      - status
      - "{{ vm_name }}"
  register: _clone_status
  retries: 5
  delay: 2
  until: _clone_status.rc == 0
  changed_when: false
