---
# utm_template_builder/tasks/create_bundle.yml
#
# Creates a UTM VM bundle by invoking UTM's own AppleScript API
# (`make new virtual machine`).  UTM writes a fully schema-valid
# config.plist (Backend, ConfigurationVersion, Information, System,
# QEMU, Input, Sharing, Display, Drive, Network, Serial, Sound) so
# we no longer maintain a hand-built skeleton bundle.
#
# After creation we:
#   1. Copy the installer ISO into the bundle's Data/ directory.
#   2. Insert Drive.0.ImageName via plutil (the only schema bit
#      AppleScript `make` does NOT populate from `source:`).
#
# Exported facts (consumed by the calling playbook):
#   _bundle_uuid        — UTM-assigned VM UUID
#   _bundle_dest        — absolute path to the .utm bundle
#   _plist_path         — absolute path to config.plist
#   _data_dir           — absolute path to bundle Data/
#   _cd_uuid            — Drive.0 (installer CD) identifier
#   _disk_uuid          — Drive.1 (system disk) identifier
#   _disk_filename      — system qcow2 filename (UTM-generated)

- name: "Create bundle: resolve paths"
  ansible.builtin.set_fact:
    _bundle_dest: "{{ utm_documents_dir }}/{{ vm_name }}.utm"
    _iso_src: "{{ utm_iso_dir }}/{{ utm_iso_name }}"

- name: "Create bundle: assert installer ISO exists"
  ansible.builtin.assert:
    that:
      - _iso_src is file
    fail_msg: >-
      Installer ISO not found at '{{ _iso_src }}'.
      Place the ISO in utm_iso_dir ({{ utm_iso_dir }}) and set
      utm_iso_name to its filename.

- name: "Create bundle: check whether destination bundle already exists"
  ansible.builtin.stat:
    path: "{{ _bundle_dest }}"
  register: _bundle_dest_stat

- name: "Create bundle: fail if destination exists and utm_overwrite_bundle is false"
  ansible.builtin.fail:
    msg: >-
      Bundle '{{ _bundle_dest }}' already exists.
      Delete it via UTM (right-click -> Delete) or set
      utm_overwrite_bundle=true to replace it.
  when:
    - _bundle_dest_stat.stat.exists
    - not (utm_overwrite_bundle | default(false) | bool)

- name: "Create bundle: delete existing VM via AppleScript (utm_overwrite_bundle=true)"
  ansible.builtin.shell: |
    /usr/bin/osascript <<'OSA'
    tell application "UTM"
        try
            delete virtual machine named "{{ vm_name }}"
        end try
    end tell
    OSA
    /bin/rm -rf "{{ _bundle_dest }}"
  args:
    executable: /bin/bash
  changed_when: true
  when:
    - _bundle_dest_stat.stat.exists
    - utm_overwrite_bundle | default(false) | bool

- name: "Create bundle: create VM via UTM AppleScript `make`"
  ansible.builtin.shell: |
    /usr/bin/osascript <<OSA
    tell application "UTM"
        set newVM to make new virtual machine with properties ¬
            {backend:qemu, configuration:{ ¬
                name:"{{ vm_name }}", ¬
                architecture:"aarch64", ¬
                machine:"virt", ¬
                memory:{{ vm_memory_mb | int }}, ¬
                cpu cores:{{ vm_cpu_cores | int }}, ¬
                uefi:true, ¬
                hypervisor:true, ¬
                drives:{ ¬
                    {removable:true}, ¬
                    {guest size:{{ (vm_disk_gb | int) * 1024 }}}, ¬
                    {removable:true} ¬
                }, ¬
                displays:{ ¬
                    {hardware:"virtio-ramfb-gl", dynamic resolution:true} ¬
                } ¬
            }}
        return id of newVM
    end tell
    OSA
  args:
    executable: /bin/bash
  register: _osa_make
  failed_when: _osa_make.rc != 0 or (_osa_make.stdout | trim | length) != 36
  changed_when: true

- name: "Create bundle: register UTM-assigned UUID and bundle paths"
  ansible.builtin.set_fact:
    _bundle_uuid: "{{ _osa_make.stdout | trim }}"
    _plist_path: "{{ _bundle_dest }}/config.plist"
    _data_dir: "{{ _bundle_dest }}/Data"

- name: "Create bundle: assert UTM created the bundle at the expected path"
  ansible.builtin.stat:
    path: "{{ _plist_path }}"
  register: _plist_stat
  failed_when: not _plist_stat.stat.exists

- name: "Create bundle: read UTM-generated drive identifiers from config.plist"
  ansible.builtin.command:
    argv:
      - /usr/libexec/PlistBuddy
      - -c
      - "Print :Drive:0:Identifier"
      - "{{ _plist_path }}"
  register: _drive0_id
  changed_when: false

- name: "Create bundle: read system-disk identifier from config.plist"
  ansible.builtin.command:
    argv:
      - /usr/libexec/PlistBuddy
      - -c
      - "Print :Drive:1:Identifier"
      - "{{ _plist_path }}"
  register: _drive1_id
  changed_when: false

- name: "Create bundle: read answer-CD identifier from config.plist"
  ansible.builtin.command:
    argv:
      - /usr/libexec/PlistBuddy
      - -c
      - "Print :Drive:2:Identifier"
      - "{{ _plist_path }}"
  register: _drive2_id
  changed_when: false

- name: "Create bundle: register drive UUID facts"
  ansible.builtin.set_fact:
    _cd_uuid: "{{ _drive0_id.stdout | trim }}"
    _disk_uuid: "{{ _drive1_id.stdout | trim }}"
    _disk_filename: "{{ _drive1_id.stdout | trim }}.qcow2"
    _answer_cd_uuid: "{{ _drive2_id.stdout | trim }}"

- name: "Create bundle: copy installer ISO into bundle Data/"
  ansible.builtin.copy:
    src: "{{ _iso_src }}"
    dest: "{{ _data_dir }}/{{ utm_iso_name }}"
    mode: "0644"

- name: "Create bundle: report bundle facts"
  ansible.builtin.debug:
    msg: >-
      Bundle '{{ vm_name }}.utm' created via UTM AppleScript API —
      UUID: {{ _bundle_uuid }},
      cd UUID: {{ _cd_uuid }},
      disk UUID: {{ _disk_uuid }},
      disk file: {{ _disk_filename }},
      CPU: {{ vm_cpu_cores }}, RAM: {{ vm_memory_mb }} MB,
      bundle: {{ _bundle_dest }}
