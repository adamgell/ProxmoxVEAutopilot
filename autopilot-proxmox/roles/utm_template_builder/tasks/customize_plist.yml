---
# utm_template_builder/tasks/customize_plist.yml
#
# UTM's AppleScript `make` API writes a fully schema-valid plist
# (Backend, ConfigurationVersion, System, QEMU, Sharing, Serial,
# Sound, Display, Network, Information.UUID, Information.Name,
# Drive[].Identifier, Drive[].ImageType, etc.) so almost every
# plutil step we used to need is gone.
#
# The only piece UTM does NOT populate is the installer CD's
# ImageName -- the `source:` property on a new drive in `make`
# is silently ignored.  We fill it in here.
#
# Depends on facts set by create_bundle.yml:
#   _plist_path, utm_iso_name

- name: "Customize plist: replace Drive.0.ImageName (installer CD)"
  ansible.builtin.command:
    argv:
      - plutil
      - -replace
      - Drive.0.ImageName
      - -string
      - "{{ utm_iso_name }}"
      - "{{ _plist_path }}"
  register: _plutil_replace_cd_image
  failed_when: false
  changed_when: _plutil_replace_cd_image.rc == 0

- name: "Customize plist: insert Drive.0.ImageName if key was absent"
  ansible.builtin.command:
    argv:
      - plutil
      - -insert
      - Drive.0.ImageName
      - -string
      - "{{ utm_iso_name }}"
      - "{{ _plist_path }}"
  register: _plutil_insert_cd_image
  failed_when: _plutil_insert_cd_image.rc != 0
  changed_when: true
  when: _plutil_replace_cd_image.rc != 0
