---
# =============================================================================
# Proxmox connection
# =============================================================================
proxmox_host: "192.168.2.200"
proxmox_port: 8006
proxmox_node: "pve2"
proxmox_api_base: "https://{{ proxmox_host }}:{{ proxmox_port }}/api2/json"
proxmox_validate_certs: false

# Constructed from vault secrets — used in all uri headers
proxmox_api_auth_header: "PVEAPIToken={{ vault_proxmox_api_token_id }}={{ vault_proxmox_api_token_secret }}"

# =============================================================================
# Storage and networking
# =============================================================================
proxmox_storage: "ssdpool"
proxmox_iso_storage: "isos"
proxmox_bridge: "vmbr0"
proxmox_vlan_tag: null

# =============================================================================
# ISO paths (Proxmox storage notation)
# =============================================================================
proxmox_windows_iso: "isos:iso/en-us_windows_11_business_editions_version_25h2_updated_jan_2026_x64_dvd_09c1e011.iso"
proxmox_virtio_iso: "isos:iso/virtio-win-0.1.285.iso"
proxmox_answer_iso: "isos:iso/autounattend.iso"

# =============================================================================
# Template settings (for clone provisioning)
# =============================================================================
proxmox_template_vmid: 105

# =============================================================================
# VM defaults
# =============================================================================
vm_cores: 2
vm_memory_mb: 4096
vm_disk_size_gb: 64
vm_ostype: "win11"
vm_count: 1
vm_name_prefix: "autopilot"
vm_start_after_create: true

# OEM profile key (from files/oem_profiles.yml), e.g. "lenovo-t14"
vm_oem_profile: "generic-desktop"
vm_custom_serial: null
vm_serial_prefix: null
vm_group_tag: null

# =============================================================================
# Autopilot
# =============================================================================
autopilot_config_path: "{{ playbook_dir }}/../files/AutopilotConfigurationFile.json"
autopilot_skip: true
capture_hardware_hash: true
hash_output_dir: "{{ playbook_dir }}/../output/hashes"

# =============================================================================
# Timeouts
# =============================================================================
guest_agent_timeout_seconds: 1800
guest_agent_poll_interval_seconds: 10
guest_exec_timeout_seconds: 300
guest_exec_poll_interval_seconds: 2
hash_capture_timeout_seconds: 600

# Proxmox task polling
task_poll_retries: 120
task_poll_delay_seconds: 1

# =============================================================================
# Ubuntu (task sequences target_os=ubuntu)
# =============================================================================
ubuntu_release: "noble"                     # 24.04 codename
ubuntu_locale: "en_US.UTF-8"
ubuntu_timezone: "UTC"
ubuntu_keyboard_layout: "us"                # accepted but ignored by compiler
ubuntu_storage_layout: "lvm"                # accepted but ignored by compiler
# Cloud image we boot directly (replaces the legacy live-server ISO path).
# Upload this to Proxmox ISO storage first — e.g. via Proxmox's
# "Storage -> isos -> Download from URL" using:
#   https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
# (NOTE: the suffix must be .img on disk; Proxmox treats it as a qcow2.)
ubuntu_cloud_image: "local:import/ubuntu-24.04-server-cloudimg-amd64.qcow2"
ubuntu_seed_iso: "isos:iso/ubuntu-seed.iso"
# Per-clone cloud-init seed ISO filename pattern (the Ubuntu branch of the
# clone playbook writes a per-VM ISO here, named with the VMID).
ubuntu_per_vm_seed_pattern: "isos:iso/ubuntu-per-vm-{{ vmid }}.iso"
