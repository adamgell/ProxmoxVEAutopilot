<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign in - Proxmox VE Autopilot</title>
  <link rel="icon" type="image/svg+xml" href="/auth/logo">
  <style>
    /* Login page is intentionally a fixed light aesthetic. The XP Bliss
       wallpaper defines the mood; supporting dark-mode tokens here would
       make the card clash with the photo. Once the operator authenticates,
       the authenticated app (/base.html) is fully theme-aware. */
    html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, -apple-system, sans-serif; color: #212529; }
    body {
      /* Bliss-remastered 5K, baked into /app/files/bliss.jpg and
         served from /auth/bliss. Sky-blue → grass-green gradient
         is the fallback if the image is ever missing (unlikely —
         it ships in the image). */
      background:
        linear-gradient(180deg, #a6cff5 0%, #5aa3e1 55%, #7fae3d 56%, #6b9232 100%)
        center/cover no-repeat fixed;
    }
    body.bliss {
      background: url("/auth/bliss") center/cover no-repeat fixed;
    }
    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card {
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(2px);
      max-width: 380px; width: 100%;
      padding: 24px 28px 20px;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .brand img { width: 48px; height: 48px; display: block; }
    .brand-text h1 { margin: 0; font-size: 18px; letter-spacing: -0.01em; line-height: 1.2; }
    .brand-text .subtitle { color: #6c757d; margin: 2px 0 0 0; font-size: 13px; }
    .subtitle { color: #6c757d; margin: 0 0 18px 0; font-size: 13px; }

    .tenant {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #343a40; margin-bottom: 16px;
    }
    .tenant-label {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      background: #e9ecef; padding: 3px 8px; border-radius: 3px;
      color: #212529; font-weight: 600;
    }

    .msbtn {
      display: flex; width: 100%; align-items: center; justify-content: center;
      gap: 10px; padding: 10px 14px; background: #2f2f2f; color: #fff;
      border: 0; border-radius: 4px; cursor: pointer; font-size: 14px;
      text-decoration: none; font-weight: 500;
      transition: background 0.15s;
      box-sizing: border-box;
    }
    .msbtn:hover { background: #1c1c1c; }
    .msbtn:focus-visible { outline: 2px solid #7fae3d; outline-offset: 2px; }
    .msbtn svg { flex-shrink: 0; }

    .err {
      background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;
      padding: 8px 10px; border-radius: 4px; margin-bottom: 14px;
      font-size: 13px;
    }

    .footer {
      margin-top: 16px; font-size: 11px; color: #868e96; text-align: center;
    }
    .footer code { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  </style>
</head>
<body class="bliss">
<div class="wrap">
  <div class="card">
    <div class="brand">
      <img src="/auth/logo" alt="">
      <div class="brand-text">
        <h1>Proxmox VE Autopilot</h1>
        <p class="subtitle">Sign in to continue.</p>
      </div>
    </div>
    <div style="height: 14px;"></div>

    {% if error %}
    <div class="err">{{ error }}</div>
    {% endif %}

    {% if tenant_label %}
    <div class="tenant" title="Entra tenant this instance authenticates against">
      <span>tenant:</span>
      <span class="tenant-label">{{ tenant_label }}</span>
    </div>
    {% endif %}

    <a class="msbtn" href="/auth/login/start?next={{ next_url }}">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 21 21">
        <rect x="1" y="1" width="9" height="9" fill="#f35325"/>
        <rect x="11" y="1" width="9" height="9" fill="#81bc06"/>
        <rect x="1" y="11" width="9" height="9" fill="#05a6f0"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffba08"/>
      </svg>
      Sign in with Microsoft
    </a>

    <div class="footer">
      Build <code>{{ build_sha or 'unknown' }}</code>
      {% if build_time %} · <span title="{{ build_time }}">{{ build_time[:10] }}</span>{% endif %}
    </div>
  </div>
</div>

<script>
// Probe the local bliss.jpg; start with .bliss applied so the photo
// paints immediately, and remove the class only if the probe fails.
// (Inverted polarity avoids a ~100ms flash of the gradient fallback
// on cold loads when the image probe beats first paint.) If the file
// is ever missing (old image tag without the asset, broken mount)
// the sky-and-grass gradient fallback takes over.
(function() {
  var img = new Image();
  img.onerror = function() { document.body.classList.remove('bliss'); };
  img.src = '/auth/bliss';
})();
</script>
</body>
</html>
