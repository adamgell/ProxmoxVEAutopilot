<!doctype html>
<html lang="en" data-react-shell="{{ shell_kind | default('protected') }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Proxmox VE Autopilot</title>
    <link rel="icon" type="image/svg+xml" href="/auth/logo" />
    {% for href in asset_styles %}
    <link rel="stylesheet" href="{{ href }}" />
    {% endfor %}
    <style>
      @media (min-width: 961px) {
        .workspace__globalbar {
          grid-template-columns: 248px minmax(260px, 640px) max-content !important;
          gap: 0 !important;
          padding: 8px 18px 8px 0 !important;
        }
        .workspace__global-brand {
          padding-left: 18px !important;
        }
        .workspace__command {
          grid-column: 2 !important;
        }
      }
    </style>
  </head>
  <body>
    <div
      id="react-root"
      data-build-version="{{ build_version }}"
      data-build-sha="{{ build_sha }}"
      data-build-time="{{ build_time }}"
      data-user-name="{{ user_name }}"
      data-user-email="{{ user_email }}"
      data-onboarding="{{ onboarding_json | safe }}"
    >
      <noscript>Proxmox VE Autopilot requires JavaScript for the React console.</noscript>
    </div>
    {% for src in asset_scripts %}
    <script type="module" src="{{ src }}"></script>
    {% endfor %}
  </body>
</html>
