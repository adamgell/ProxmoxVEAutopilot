---
# Built-in OEM hardware profiles for SMBIOS emulation.
# Each profile defines the SMBIOS type 1 fields that Proxmox will expose
# to the guest OS, making Windows Autopilot see the VM as real OEM hardware.
#
# chassis_type is honored via SMBIOS Type 3 file passthrough: the web
# layer generates a minimal Type 3 binary per unique chassis_type,
# uploads it to the Proxmox 'local' snippets storage, and adds a
# `-smbios file=...` entry to the VM's `args:` line. This is what
# WMI Win32_SystemEnclosure.ChassisTypes reports inside the guest.
# Common values: 3=Desktop, 8=Portable, 9=Laptop, 10=Notebook,
# 14=Sub Notebook, 15=Space-saving, 30=Tablet, 31=Convertible,
# 32=Detachable, 35=Mini PC.
#
# SKU values: Lenovo CTO codes (e.g. 21MLCTO1WW) are documented machine
# types. Microsoft Surface uses underscore-joined product names. Dell/HP
# SKU codes shown below are representative of the format each OEM uses
# but may not match every unit — if Autopilot assignment rules fire on
# SKU, verify by running Get-WindowsAutopilotInfo on a real device and
# updating the entry below.

