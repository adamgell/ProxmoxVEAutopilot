---
# Built-in OEM hardware profiles for SMBIOS emulation.
# Each profile defines the SMBIOS type 1 fields that Proxmox will expose
# to the guest OS, making Windows Autopilot see the VM as real OEM hardware.
#
# chassis_type is logged as a warning and skipped — Proxmox 9 does not
# support smbios2 (chassis type) configuration.

oem_profiles:
  lenovo-p520:
    manufacturer: "Lenovo"
    product: "ThinkStation P520"
    family: "ThinkStation"
    sku: "30BFS44D00"
    chassis_type: 3

  lenovo-t14:
