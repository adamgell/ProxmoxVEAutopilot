# Minimal MIT Kerberos config for the autopilot container.
#
# Realm: HOME.GELL.ONE
# KDC:   dns.home.gell.one (192.168.2.7)
#
# Used by /api/monitoring/* AD probes via python-ldap's SASL/GSSAPI
# bind — keytab at /etc/krb5.keytab is kept fresh by the DC-side
# refresher cron (see docs/specs/2026-04-20-device-state-monitoring-
# design.md → "Auth follow-up"). Bake-in rather than mount so a
# missing /etc/krb5.conf on the host doesn't break AD probes;
# operators pointing at a different realm can overlay via volume
# mount in docker-compose.yml.
[libdefaults]
    default_realm = HOME.GELL.ONE
    dns_lookup_realm = false
    dns_lookup_kdc = true
    rdns = false
    forwardable = true
    # Force TCP — UDP Kerberos breaks on larger replies (groups in PAC)
    # and adds no value on a modern LAN.
    udp_preference_limit = 0
    default_ccache_name = FILE:/tmp/krb5cc_%{uid}

[realms]
    HOME.GELL.ONE = {
        kdc = dns.home.gell.one
        admin_server = dns.home.gell.one
        default_domain = home.gell.one
    }

[domain_realm]
    .home.gell.one = HOME.GELL.ONE
    home.gell.one = HOME.GELL.ONE
