---
# Single VM provisioning via clone — included by provision_clone.yml loop.

- name: "Clone VM {{ _vm_index }} from template"
  ansible.builtin.include_role:
    name: proxmox_vm_clone

- name: "Wait for guest agent on VM {{ vm_vmid }}"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/common/tasks/wait_guest_agent.yml"

- name: "Wait for TPM to stabilize on VM {{ vm_vmid }}"
  ansible.builtin.pause:
    seconds: 60

- name: "Re-wait for guest agent after TPM pause on VM {{ vm_vmid }}"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/common/tasks/wait_guest_agent.yml"

- name: "Inject Autopilot config into VM {{ vm_vmid }}"
  ansible.builtin.include_role:
    name: autopilot_inject
  when: >-
    (autopilot_enabled is defined and (autopilot_enabled | bool))
    or
    (autopilot_enabled is not defined and not (autopilot_skip | default(false) | bool))

- name: "Iterate RunOnce steps for VM {{ vm_vmid }}"
  when: _runonce_scripts_json is defined and _runonce_scripts_json | length > 0
  block:
    - name: "Parse runonce_scripts manifest"
      ansible.builtin.set_fact:
        _runonce_scripts: "{{ _runonce_scripts_json | from_json }}"

    - name: "Run each RunOnce step in order"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/common/tasks/run_one_runonce_step.yml"
      loop: "{{ _runonce_scripts }}"
      loop_control:
        loop_var: item
        label: "{{ item.step_type }}"

- name: "Capture hardware hash from VM {{ vm_vmid }}"
  ansible.builtin.include_role:
    name: hash_capture
  when: capture_hardware_hash | default(true) | bool
