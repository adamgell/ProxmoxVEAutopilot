---
# OSDeploy v2 provisioning path. The static OSDeploy PE ISO registers VM
# identity through /api/osdeploy/v1, applies the selected image from the ISO,
# stages the full-OS OSD client and AutopilotAgent, then hands off to disk boot.

- name: Provision a Proxmox VM via OSDeploy v2
  hosts: localhost
  gather_facts: false
  vars:
    proxmox_template_vmid: "{{ osdeploy_blank_template_vmid | default(winpe_blank_template_vmid) }}"
    _skip_panther_injection: true
    _skip_chassis_type_smbios_file: true
    vm_start_after_create: false
  pre_tasks:
    - name: Validate OSDeploy path is configured
      ansible.builtin.assert:
        that:
          - osdeploy_run_id is defined
          - osdeploy_artifact_volid is defined
          - osdeploy_artifact_volid | length > 0
          - proxmox_template_vmid is not none
          - autopilot_base_url is defined
          - autopilot_base_url | length > 0
        fail_msg: >-
          OSDeploy provisioning requires osdeploy_run_id,
          osdeploy_artifact_volid, autopilot_base_url, and a blank template
          VMID from osdeploy_blank_template_vmid or winpe_blank_template_vmid.

  tasks:
    - name: Clone the OSDeploy blank template
      ansible.builtin.include_role:
        name: proxmox_vm_clone

    - name: Read cloned VM config for OSDeploy identity
      ansible.builtin.uri:
        url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/config"
        method: GET
        headers:
          Authorization: "{{ proxmox_api_auth_header }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]
      register: _osdeploy_vm_config

    - name: Extract primary VM MAC address
      ansible.builtin.set_fact:
        _osdeploy_mac: >-
          {{ (_osdeploy_vm_config.json.data.net0 | default('')) |
             regex_search('([A-Fa-f0-9]{2}:){5}[A-Fa-f0-9]{2}') }}

    - name: Fail if cloned VM has no MAC address
      ansible.builtin.fail:
        msg: "OSDeploy clone {{ vm_vmid }} has no net0 MAC address."
      when: _osdeploy_mac is not defined or (_osdeploy_mac | length) == 0

    - name: Attach OSDeploy ISO at ide2
      ansible.builtin.uri:
        url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/config"
        method: PUT
        body_format: form-urlencoded
        body:
          ide2: "{{ osdeploy_artifact_volid }},media=cdrom"
        headers:
          Authorization: "{{ proxmox_api_auth_header }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]

    - name: Attach VirtIO drivers ISO at ide3
      ansible.builtin.uri:
        url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/config"
        method: PUT
        body_format: form-urlencoded
        body:
          ide3: "{{ proxmox_virtio_iso }},media=cdrom"
        headers:
          Authorization: "{{ proxmox_api_auth_header }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]
      when: proxmox_virtio_iso is defined and (proxmox_virtio_iso | length) > 0

    - name: Set boot order to OSDeploy ISO first
      ansible.builtin.uri:
        url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/config"
        method: PUT
        body_format: form-urlencoded
        body:
          boot: "order=ide2;scsi0"
        headers:
          Authorization: "{{ proxmox_api_auth_header }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]

    - name: POST OSDeploy VM identity to Flask
      ansible.builtin.uri:
        url: "{{ autopilot_base_url }}/api/osdeploy/v1/runs/{{ osdeploy_run_id }}/identity"
        method: POST
        body_format: json
        body:
          vmid: "{{ vm_vmid | int }}"
          vm_uuid: "{{ _vm_identity.uuid }}"
          mac: "{{ _osdeploy_mac }}"
          node: "{{ proxmox_node }}"
          computer_name: "{{ vm_name }}"
        status_code: [200]

    - name: Start OSDeploy VM
      ansible.builtin.uri:
        url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/status/start"
        method: POST
        headers:
          Authorization: "{{ proxmox_api_auth_header }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]

    - name: Wait for OSDeploy PE registration
      ansible.builtin.uri:
        url: "{{ autopilot_base_url }}/api/osdeploy/v1/runs/{{ osdeploy_run_id }}"
        method: GET
        status_code: [200]
      register: _osdeploy_run
      until: (_osdeploy_run.get('json', {}).get('run', {}).get('state', '')) in ['pe_registered', 'complete', 'failed']
      retries: 240
      delay: 10

    - name: Fail if OSDeploy run failed during PE registration
      ansible.builtin.fail:
        msg: "OSDeploy run {{ osdeploy_run_id }} failed before PE handoff."
      when: (_osdeploy_run.get('json', {}).get('run', {}).get('state', '')) == 'failed'

    - name: Wait for OSDeploy PE phase completion
      ansible.builtin.uri:
        url: "{{ autopilot_base_url }}/api/osdeploy/v1/runs/{{ osdeploy_run_id }}"
        method: GET
        status_code: [200]
      register: _osdeploy_pe_complete
      until: >-
        (_osdeploy_pe_complete.get('json', {}).get('run', {}).get('state', '')) in ['complete', 'failed'] or
        ((_osdeploy_pe_complete.get('json', {}).get('run', {}).get('osdeploy_finished_at', '') | default('', true) | string) | length > 0)
      retries: 720
      delay: 10

    - name: Fail if OSDeploy run failed before disk boot handoff
      ansible.builtin.fail:
        msg: "OSDeploy run {{ osdeploy_run_id }} failed before disk boot handoff."
      when: (_osdeploy_pe_complete.get('json', {}).get('run', {}).get('state', '')) == 'failed'

    - name: Wait for OSDeploy PE shutdown
      ansible.builtin.uri:
        url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/status/current"
        method: GET
        headers:
          Authorization: "{{ proxmox_api_auth_header }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]
      register: _osdeploy_vm_shutdown
      until: _osdeploy_vm_shutdown.json.data.status == 'stopped'
      retries: 60
      delay: 5
      failed_when: false

    - name: Force stop OSDeploy VM if PE did not shut down
      ansible.builtin.uri:
        url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/status/stop"
        method: POST
        headers:
          Authorization: "{{ proxmox_api_auth_header }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]
      when: _osdeploy_vm_shutdown.json.data.status != 'stopped'

    - name: Detach OSDeploy ISO before disk boot
      ansible.builtin.uri:
        url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/config"
        method: PUT
        body_format: form-urlencoded
        body:
          delete: "ide2"
        headers:
          Authorization: "{{ proxmox_api_auth_header }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]

    - name: Detach VirtIO ISO before disk boot
      ansible.builtin.uri:
        url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/config"
        method: PUT
        body_format: form-urlencoded
        body:
          delete: "ide3"
        headers:
          Authorization: "{{ proxmox_api_auth_header }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]

    - name: Set boot order to installed Windows disk
      ansible.builtin.uri:
        url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/config"
        method: PUT
        body_format: form-urlencoded
        body:
          boot: "order=scsi0"
        headers:
          Authorization: "{{ proxmox_api_auth_header }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]

    - name: Start installed Windows from disk
      ansible.builtin.uri:
        url: "{{ proxmox_api_base }}/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/status/start"
        method: POST
        headers:
          Authorization: "{{ proxmox_api_auth_header }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]

    - name: Wait for installed OSDeploy AutopilotAgent heartbeat completion
      ansible.builtin.uri:
        url: "{{ autopilot_base_url }}/api/osdeploy/v1/runs/{{ osdeploy_run_id }}"
        method: GET
        status_code: [200]
      register: _osdeploy_complete
      until: (_osdeploy_complete.get('json', {}).get('run', {}).get('state', '')) in ['complete', 'failed']
      retries: 720
      delay: 10

    - name: Fail if OSDeploy run failed before completion
      ansible.builtin.fail:
        msg: "OSDeploy run {{ osdeploy_run_id }} failed before heartbeat completion."
      when: (_osdeploy_complete.get('json', {}).get('run', {}).get('state', '')) == 'failed'
