---
# utm_build_win11_template.yml
#
# Unattended Windows 11 ARM64 template builder for UTM (macOS/ARM64).
#
# This playbook performs a fully automated Windows 11 ARM64 installation:
#   1. Generate an answer ISO (AUTOUNATTEND label) with firstboot.ps1.
#   2. Create the VM bundle from the skeleton + installer ISO.
#   3. Copy the answer ISO into the bundle's Data/ directory.
#   4. Attach the answer ISO as Drive 2 in config.plist.
#   5. Start the VM — Windows Setup picks up autounattend.xml automatically.
#   6. Poll via `utmctl exec` until firstboot.ps1 writes the sentinel file
#      C:\autopilot\autopilot-firstboot.done (timeout: 45 minutes).
#   7. Suspend the VM and write the marker file {bundle}/autopilot-template.ready.
#
# Required variables (set in group_vars or via -e):
#   vm_name              — UTM display name / bundle stem for the new template
#   utm_iso_name         — Windows 11 ARM64 installer ISO filename in utm_iso_dir
#   utm_answer_admin_pass — Administrator password (from vault)
#
# Optional overrides:
#   utm_answer_admin_user    — default: Administrator
#   utm_answer_locale        — default: en-US
#   utm_answer_timezone      — default: Pacific Standard Time
#   utm_answer_windows_edition — default: Windows 11 Pro
#   vm_oem_profile           — OEM profile key (populates org_name in unattend)
#   utm_overwrite_bundle     — default: false (set true to replace existing bundle)
#   utm_template_poll_retries — sentinel poll retries (default: 270 = 45 min at 10s)
#   utm_template_poll_delay  — sentinel poll delay in seconds (default: 10)
#
# Usage:
#   ansible-playbook playbooks/utm_build_win11_template.yml \
#       -e vm_name=win11-arm64-template \
#       -e utm_iso_name=Win11_25H2_English_Arm64.iso
#
# The resulting bundle will be ready for cloning via utm_vm_clone once
# the marker file {bundle}/autopilot-template.ready is present.

- name: Build Windows 11 ARM64 UTM template (unattended)
  hosts: localhost
  gather_facts: false

  vars:
    utm_template_poll_retries: 270   # 270 × 10 s = 45 minutes
    utm_template_poll_delay: 10

  tasks:

    # ── 0. Input validation ─────────────────────────────────────────────────

    - name: "Template build: assert required inputs"
      ansible.builtin.assert:
        that:
          - vm_name is defined and (vm_name | length) > 0
          - utm_iso_name is defined and (utm_iso_name | length) > 0
          - utm_answer_admin_pass is defined and (utm_answer_admin_pass | length) > 0
        fail_msg: >-
          utm_build_win11_template requires vm_name, utm_iso_name, and
          utm_answer_admin_pass.  Set utm_answer_admin_pass in
          inventory/group_vars/all/vault.yml or pass via -e.

    # ── 1. Resolve OEM profile (provides _oem_profile.manufacturer) ─────────

    - name: "Template build: set vm_vmid for OEM resolver"
      ansible.builtin.set_fact:
        vm_vmid: "{{ vm_name }}"

    - name: "Template build: resolve OEM profile + identity"
      ansible.builtin.include_role:
        name: oem_profile_resolver

    # ── 2. Generate answer ISO ───────────────────────────────────────────────

    - name: "Template build: generate answer ISO via utm_answer_iso role"
      ansible.builtin.include_role:
        name: utm_answer_iso
      # utm_answer_iso_path fact is exported by the role.

    # ── 3. Create VM bundle from skeleton ───────────────────────────────────

    - name: "Template build: set vm_os_kind for bundle creation"
      ansible.builtin.set_fact:
        vm_os_kind: windows11

    - name: "Template build: render bundle via web.utm_bundle and register with UTM"
      ansible.builtin.include_role:
        name: utm_template_builder
        tasks_from: render_bundle.yml

    # ── 4. Copy answer ISO into bundle Data/ and attach as Drive 2 ─────────

    - name: "Template build: copy answer ISO into bundle Data/"
      ansible.builtin.copy:
        src: "{{ utm_answer_iso_path }}"
        dest: "{{ _data_dir }}/{{ utm_answer_iso_path | basename }}"
        mode: "0644"

    - name: "Template build: register answer ISO filename"
      ansible.builtin.set_fact:
        _answer_iso_filename: "{{ utm_answer_iso_path | basename }}"

    - name: "Template build: attach answer ISO as Drive 2 ImageName"
      ansible.builtin.command:
        argv:
          - plutil
          - -replace
          - Drive.2.ImageName
          - -string
          - "{{ _answer_iso_filename }}"
          - "{{ _plist_path }}"
      register: _plutil_answer_replace
      failed_when: false
      changed_when: _plutil_answer_replace.rc == 0

    - name: "Template build: insert Drive.2.ImageName if key was absent"
      ansible.builtin.command:
        argv:
          - plutil
          - -insert
          - Drive.2.ImageName
          - -string
          - "{{ _answer_iso_filename }}"
          - "{{ _plist_path }}"
      register: _plutil_result
      failed_when: _plutil_result.rc != 0
      changed_when: true
      when: _plutil_answer_replace.rc != 0

    - name: "Template build: attach virtio-win ISO as Drive 3 ImageName"
      ansible.builtin.command:
        argv:
          - plutil
          - -replace
          - Drive.3.ImageName
          - -string
          - "{{ utm_virtio_win_iso_name | default('virtio-win.iso') }}"
          - "{{ _plist_path }}"
      register: _plutil_virtio_replace
      failed_when: false
      changed_when: _plutil_virtio_replace.rc == 0

    - name: "Template build: insert Drive.3.ImageName if key was absent"
      ansible.builtin.command:
        argv:
          - plutil
          - -insert
          - Drive.3.ImageName
          - -string
          - "{{ utm_virtio_win_iso_name | default('virtio-win.iso') }}"
          - "{{ _plist_path }}"
      register: _plutil_virtio_insert
      failed_when: _plutil_virtio_insert.rc != 0
      changed_when: true
      when: _plutil_virtio_replace.rc != 0

    # ── 5. VM is already registered by AppleScript `make` — skip open(1) ──
    #
    # The UTM AppleScript `make new virtual machine` call inside
    # roles/utm_template_builder/tasks/create_bundle.yml registers the
    # bundle with UTM atomically and returns the UUID UTM assigned.
    # No `open -a UTM` document-registration dance is required.

    - name: "Template build: adopt UTM-assigned UUID from create_bundle"
      ansible.builtin.set_fact:
        _utm_assigned_uuid: "{{ _bundle_uuid }}"

    - name: "Template build: report registered UUID"
      ansible.builtin.debug:
        msg: "UTM registered bundle with UUID {{ _utm_assigned_uuid }} (via AppleScript make)"

    # UTM caches each VM's configuration in memory after `make`. Our subsequent
    # plutil patches (Drive.0 + Drive.2 ImageName) only land on disk; without a
    # restart UTM launches QEMU with empty CD drives (no `file.filename=`),
    # which leaves EDK2 dropped at the UEFI shell with no bootable media.
    # Quitting and relaunching UTM forces a fresh read of config.plist.
    - name: "Template build: quit UTM so it re-reads patched config.plist"
      ansible.builtin.command:
        argv:
          - osascript
          - -e
          - 'tell application "UTM" to quit'
      changed_when: true

    - name: "Template build: wait for UTM to fully exit"
      ansible.builtin.wait_for:
        timeout: 10
      delegate_to: localhost

    - name: "Template build: relaunch UTM"
      ansible.builtin.command:
        argv:
          - /usr/bin/open
          - -a
          - UTM
      changed_when: true

    - name: "Template build: wait for UTM to be ready"
      ansible.builtin.wait_for:
        timeout: 5
      delegate_to: localhost

    - name: "Template build: verify VM appears in utmctl list"
      ansible.builtin.command:
        argv:
          - "{{ utm_utmctl_path }}"
          - status
          - "{{ _utm_assigned_uuid }}"
      register: _utmctl_status_check
      changed_when: false
      failed_when: _utmctl_status_check.rc != 0

    # ── 6. Start the VM by its UTM-assigned UUID ───────────────────────────

    - name: "Template build: start VM by UTM-assigned UUID"
      ansible.builtin.command:
        argv:
          - "{{ utm_utmctl_path }}"
          - start
          - "{{ _utm_assigned_uuid }}"
          - --hide
      register: _start_result
      failed_when: _start_result.rc != 0
      changed_when: true

    - name: "Template build: wait for VM to reach 'started' status"
      ansible.builtin.command:
        argv:
          - "{{ utm_utmctl_path }}"
          - status
          - "{{ _utm_assigned_uuid }}"
      register: _status_poll
      retries: 30
      delay: 5
      until: _status_poll.stdout | trim == 'started'
      failed_when: false
      changed_when: false

    # ── 6a. Escape the EFI shell ────────────────────────────────────────────
    #
    # EDK2 on `qemu-aarch64 virt` doesn't auto-boot from removable USB CDs
    # (no NVRAM Boot#### entry exists for them on first boot), so the firmware
    # drops to the UEFI Shell. We script our way out by sending keystrokes via
    # UTM AppleScript: switch to fs0:, exec `efi\boot\bootaa64.efi`, then spam
    # spaces to acknowledge the "Press any key to boot from CD or DVD" prompt
    # that the Windows ARM64 installer shows for ~5 seconds.

    - name: "Template build: wait for EFI shell to be reached"
      ansible.builtin.wait_for:
        timeout: 12
      delegate_to: localhost

    - name: "Template build: send EFI shell boot sequence via AppleScript"
      ansible.builtin.shell: |
        /usr/bin/osascript <<OSA
        tell application "UTM"
            set vm to virtual machine id "{{ _utm_assigned_uuid }}"
            input keystroke vm text "fs0:
        "
            delay 1
            input keystroke vm text "efi\\\\boot\\\\bootaa64.efi
        "
            delay 1
            repeat 30 times
                input keystroke vm text " "
                delay 0.3
            end repeat
        end tell
        OSA
      args:
        executable: /bin/bash
      changed_when: true

    # ── 6b. Poll for firstboot sentinel ─────────────────────────────────────
    #
    # Windows Setup runs: WinPE → specialize → OOBE → AutoLogon →
    # FirstLogonCommands → firstboot.ps1 → writes sentinel.
    # Total time: typically 15-30 minutes on Apple Silicon (M-series).
    # Retry budget: utm_template_poll_retries × utm_template_poll_delay seconds.

    - name: >-
        Template build: poll for firstboot sentinel
        C:\autopilot\autopilot-firstboot.done
        (max {{ utm_template_poll_retries * utm_template_poll_delay // 60 }} min)
      ansible.builtin.command:
        argv:
          - "{{ utm_utmctl_path }}"
          - exec
          - "{{ _utm_assigned_uuid }}"
          - --
          - powershell.exe
          - -Command
          - "if (Test-Path 'C:\\autopilot\\autopilot-firstboot.done') { 'SENTINEL_FOUND' } else { 'SENTINEL_MISSING' }"
      register: _sentinel_poll
      retries: "{{ utm_template_poll_retries }}"
      delay: "{{ utm_template_poll_delay }}"
      until: "'SENTINEL_FOUND' in (_sentinel_poll.stdout | default(''))"
      failed_when: >-
        _sentinel_poll.attempts | default(1) > utm_template_poll_retries
        and 'SENTINEL_FOUND' not in (_sentinel_poll.stdout | default(''))
      changed_when: false

    - name: "Template build: confirm sentinel detected"
      ansible.builtin.debug:
        msg: >-
          Sentinel detected after {{ _sentinel_poll.attempts | default(1) }}
          poll attempt(s) (~{{
            (_sentinel_poll.attempts | default(1) | int) * (utm_template_poll_delay | int)
          }} s elapsed). Proceeding to suspend.

    # ── 7. Suspend VM and write marker ──────────────────────────────────────

    - name: "Template build: suspend '{{ vm_name }}'"
      ansible.builtin.command:
        argv:
          - "{{ utm_utmctl_path }}"
          - suspend
          - "{{ _utm_assigned_uuid }}"
      register: _suspend_result
      failed_when: _suspend_result.rc != 0
      changed_when: true

    - name: "Template build: wait for VM to reach suspended/stopped"
      ansible.builtin.command:
        argv:
          - "{{ utm_utmctl_path }}"
          - status
          - "{{ _utm_assigned_uuid }}"
      register: _post_suspend_status
      retries: 30
      delay: 5
      until: >-
        _post_suspend_status.stdout | trim in ['suspended', 'stopped', 'paused']
      failed_when: false
      changed_when: false

    - name: "Template build: set bundle path fact"
      ansible.builtin.set_fact:
        _template_bundle_path: "{{ utm_documents_dir }}/{{ vm_name }}.utm"

    - name: "Template build: write autopilot-template.ready marker"
      ansible.builtin.copy:
        content: |
          autopilot-template.ready
          vm_name={{ vm_name }}
          built_at={{ ansible_date_time.iso8601 | default('unknown') }}
          sentinel_polls={{ _sentinel_poll.attempts | default('unknown') }}
        dest: "{{ _template_bundle_path }}/autopilot-template.ready"
        mode: "0644"

    - name: "Template build: success summary"
      ansible.builtin.debug:
        msg: >-
          Template '{{ vm_name }}' is ready.
          Bundle: {{ _template_bundle_path }}
          Marker: {{ _template_bundle_path }}/autopilot-template.ready
          Use utm_template_vm_name={{ vm_name }} in Settings to clone from it.
