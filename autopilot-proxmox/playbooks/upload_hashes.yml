---
# Upload hardware hash CSVs to Windows Autopilot via PowerShell.
# Requires pwsh (PowerShell Core) and the WindowsAutopilotIntune module on the controller.
#
# Usage:
#   ansible-playbook playbooks/upload_hashes.yml --ask-vault-pass
#
# Prerequisites:
#   pwsh -Command "Install-Module -Name WindowsAutopilotIntune -MinimumVersion 5.4.0 -Force"

- name: Upload hardware hashes to Intune
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Check for hash files
      ansible.builtin.find:
        paths: "{{ hash_output_dir }}"
        patterns: "*_hwid.csv"
      register: _hash_files

    - name: Fail if no hash files found
      ansible.builtin.fail:
        msg: "No hardware hash CSV files found in {{ hash_output_dir }}"
      when: _hash_files.matched == 0

    - name: Upload each hash CSV to Autopilot
      ansible.builtin.command:
        cmd: >-
          pwsh -Command "
            Import-Module WindowsAutopilotIntune;
            Connect-MgGraph -ClientId '{{ vault_entra_app_id }}'
              -TenantId '{{ vault_entra_tenant_id }}'
              -ClientSecret (ConvertTo-SecureString '{{ vault_entra_app_secret }}' -AsPlainText -Force);
            Import-AutopilotCSV -csvFile '{{ item.path }}'
          "
      loop: "{{ _hash_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      register: _upload_result
      changed_when: "'imported' in (_upload_result.stdout | default('') | lower)"

    - name: Show upload results
      ansible.builtin.debug:
        msg: "Uploaded {{ _hash_files.matched }} hash file(s) to Autopilot"
