---
# Upload hardware hash CSVs to Windows Autopilot via PowerShell.
# Requires pwsh (PowerShell Core) and modules on the controller.
#
# Usage:
#   ansible-playbook playbooks/upload_hashes.yml --ask-vault-pass
#
# Prerequisites:
#   pwsh -Command "Install-Module -Name Microsoft.Graph.Authentication -Force"
#   pwsh -Command "Install-Module -Name WindowsAutopilotIntune -MinimumVersion 5.4.0 -Force"

- name: Upload hardware hashes to Intune
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Check for hash files
      ansible.builtin.find:
        paths: "{{ hash_output_dir }}"
        patterns: "*_hwid.csv"
      register: _hash_files
      when: hash_file is not defined or (hash_file | string | length) == 0

    - name: Check selected hash file
      ansible.builtin.stat:
        path: "{{ hash_file }}"
      register: _selected_hash_file
      when: hash_file is defined and (hash_file | string | length) > 0

    - name: Fail if no hash files found
      ansible.builtin.fail:
        msg: "No hardware hash CSV files found in {{ hash_output_dir }}"
      when:
        - hash_file is not defined or (hash_file | string | length) == 0
        - _hash_files.matched == 0

    - name: Fail if selected hash file is missing
      ansible.builtin.fail:
        msg: "Selected hardware hash CSV file not found: {{ hash_file }}"
      when:
        - hash_file is defined and (hash_file | string | length) > 0
        - not _selected_hash_file.stat.exists

    - name: Upload hashes to Autopilot
      ansible.builtin.command:
        cmd: "pwsh -NonInteractive -File {{ playbook_dir }}/../scripts/upload_hashes.ps1"
      environment:
        ENTRA_APP_ID: "{{ vault_entra_app_id }}"
        ENTRA_TENANT_ID: "{{ vault_entra_tenant_id }}"
        ENTRA_APP_SECRET: "{{ vault_entra_app_secret }}"
        HASH_DIR: "{{ hash_output_dir }}"
        HASH_FILE: "{{ hash_file | default('') }}"
        GROUP_TAG: "{{ vm_group_tag | default('') }}"
      async: 1800
      poll: 10
      register: _upload_result
      changed_when: true

    - name: Show upload results
      ansible.builtin.debug:
        msg: "{{ _upload_result.stdout_lines }}"
