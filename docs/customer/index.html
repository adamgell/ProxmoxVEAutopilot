<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=../index.html">
  <script>
    const target = `../index.html${window.location.hash || ""}`;
    window.location.replace(target);
  </script>
  <title>Proxmox VE Autopilot Customer Guide</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #141613;
      --panel: #20241f;
      --ink: #f1eadc;
      --muted: #bbb4a8;
      --line: #3b4038;
      --gold: #d8b36a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.5;
    }

    main {
      width: min(680px, 100%);
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    a {
      color: var(--gold);
    }
  </style>
</head>
<body>
  <main>
    <h1>Customer guide moved</h1>
    <p>The customer guide and docs landing page are now one document. Continue to <a href="../index.html">the merged guide</a>.</p>
  </main>
</body>
</html>
