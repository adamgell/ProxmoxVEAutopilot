<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Proxmox VE Autopilot // Full Cockpit Mockup</title>
<style>
:root {
  color-scheme: dark;
  --bg: #05070a;
  --deck: #080d13;
  --panel: #0d141e;
  --panel-2: #111b27;
  --panel-3: #172435;
  --ink: #f3f8ff;
  --muted: #9cacbf;
  --soft: #63758a;
  --line: #223247;
  --line-2: #344b67;
  --blue: #35b8ff;
  --cyan: #5ce8d6;
  --green: #a6ec45;
  --yellow: #ffd15d;
  --red: #ff684e;
  --violet: #a98cff;
  --shadow: 0 26px 80px rgba(0, 0, 0, .56);
  --radius: 8px;
  --rail: 88px;
  --inspector: 404px;
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  font: 13.5px/1.45 "Aptos", "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
  background:
    radial-gradient(900px 380px at 58% -12%, rgba(54, 183, 255, .2), transparent 66%),
    linear-gradient(180deg, #05070a, #081018 47%, #05070a);
}
body:before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: .9;
  background:
    linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
  background-size: 36px 36px;
  mask-image: linear-gradient(#000 0 74%, transparent);
}
button, input, select, textarea { font: inherit; }
button { color: inherit; }
a { color: var(--blue); text-decoration: none; }
a:hover { color: var(--ink); }
.app {
  position: relative;
  min-height: 100vh;
  display: grid;
  grid-template-rows: 64px 1fr;
}
.topbar {
  position: sticky;
  top: 0;
  z-index: 60;
  display: grid;
  grid-template-columns: 286px minmax(280px, 1fr) auto;
  align-items: center;
  gap: 14px;
  padding: 0 18px;
  border-bottom: 1px solid var(--line);
  background: rgba(5, 7, 10, .91);
  backdrop-filter: blur(18px);
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}
.mark {
  width: 40px;
  height: 40px;
  border-radius: 9px;
  flex: 0 0 auto;
  background:
    linear-gradient(135deg, #f25022 0 30%, #7fba00 30% 58%, #00a4ef 58%);
  box-shadow: 0 0 0 1px rgba(255,255,255,.16), 0 0 30px rgba(54,183,255,.2);
}
.brand b { display: block; font-size: 14px; letter-spacing: .01em; }
.brand span,
.micro {
  display: block;
  color: var(--soft);
  font-size: 10px;
  font-weight: 850;
  letter-spacing: .12em;
  text-transform: uppercase;
}
.command {
  height: 42px;
  max-width: 840px;
  display: grid;
  grid-template-columns: 22px 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 0 13px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #0a1018;
}
.command input {
  min-width: 0;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--ink);
}
.slash,
.kbd {
  border: 1px solid var(--line-2);
  border-radius: 5px;
  color: var(--muted);
  background: var(--panel-2);
  font: 11px/1 "IBM Plex Mono", "SF Mono", monospace;
  padding: 4px 7px;
}
.top-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  flex-wrap: wrap;
}
.btn {
  min-height: 36px;
  border: 1px solid var(--line-2);
  border-radius: 7px;
  background: linear-gradient(180deg, #172437, #101824);
  color: var(--ink);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 12px;
  font-weight: 850;
  cursor: pointer;
  white-space: nowrap;
  text-decoration: none;
}
.btn:hover,
.btn.active {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(54,183,255,.1);
}
.btn.primary {
  border-color: #22bfff;
  background: linear-gradient(180deg, #078bd5, #00629d);
}
.btn.danger {
  color: #ffc2b7;
  border-color: rgba(255,104,78,.58);
  background: linear-gradient(180deg, #2d1715, #151015);
}
.btn.ghost { background: rgba(255,255,255,.03); }
.btn:disabled {
  cursor: not-allowed;
  opacity: .46;
  box-shadow: none;
}
.layout {
  display: grid;
  grid-template-columns: var(--rail) minmax(0, 1fr) var(--inspector);
  gap: 14px;
  padding: 14px 18px 28px;
}
.rail {
  position: sticky;
  top: 78px;
  height: calc(100vh - 92px);
  display: grid;
  align-content: start;
  gap: 9px;
}
.rail-group {
  display: grid;
  gap: 7px;
}
.rail-label {
  color: var(--soft);
  font-size: 9px;
  font-weight: 950;
  letter-spacing: .14em;
  text-transform: uppercase;
  text-align: center;
  margin: 4px 0 1px;
}
.rail button {
  min-height: 54px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--panel);
  color: var(--muted);
  cursor: pointer;
  font-size: 10px;
  font-weight: 950;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.rail button:hover,
.rail button.active {
  color: #fff;
  border-color: var(--blue);
  background: rgba(54,183,255,.09);
  box-shadow: inset 3px 0 0 var(--blue);
}
.main {
  min-width: 0;
  display: grid;
  gap: 14px;
  align-content: start;
}
.screen-head {
  min-height: 184px;
  position: relative;
  overflow: hidden;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 340px;
  gap: 16px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background:
    linear-gradient(112deg, rgba(54,183,255,.16), rgba(98,234,216,.05) 38%, rgba(255,104,78,.06)),
    var(--panel);
  box-shadow: var(--shadow);
  padding: 18px;
  animation: rise .42s cubic-bezier(.2,.75,.25,1) both;
}
.screen-head:after {
  content: "";
  position: absolute;
  right: -86px;
  top: -110px;
  width: 340px;
  height: 340px;
  border: 1px solid rgba(54,183,255,.14);
  transform: rotate(35deg);
  box-shadow: inset 0 0 90px rgba(54,183,255,.08);
}
.eyebrow {
  color: var(--blue);
  font-size: 10.5px;
  font-weight: 950;
  letter-spacing: .15em;
  text-transform: uppercase;
}
.live-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 7px;
  background: var(--green);
  box-shadow: 0 0 0 0 rgba(164,235,70,.45);
  animation: pulse 1.8s infinite;
}
.screen-head h1 {
  max-width: 780px;
  margin: 8px 0 8px;
  font-size: 32px;
  line-height: 1.02;
  letter-spacing: 0;
}
.screen-head p {
  max-width: 820px;
  color: var(--muted);
  margin: 0;
}
.hero-actions {
  position: relative;
  z-index: 2;
  margin-top: 20px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.readout {
  position: relative;
  z-index: 2;
  display: grid;
  gap: 10px;
  align-content: start;
  padding: 14px;
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 8px;
  background: rgba(8,13,19,.72);
}
.scoreline {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--line);
}
.scoreline b {
  font: 48px/.9 "IBM Plex Mono", "SF Mono", monospace;
}
.scoreline span { color: var(--green); font-weight: 900; }
.meter-row {
  display: grid;
  grid-template-columns: 92px 1fr 38px;
  gap: 9px;
  align-items: center;
  color: var(--muted);
  font-size: 12px;
}
.meter {
  height: 8px;
  border-radius: 999px;
  overflow: hidden;
  background: rgba(255,255,255,.06);
}
.meter i {
  display: block;
  height: 100%;
  width: var(--w);
  background: linear-gradient(90deg, var(--blue), var(--cyan), var(--green));
  background-size: 220% 100%;
  animation: flow 2.8s linear infinite;
}
.grid {
  display: grid;
  gap: 14px;
}
.grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.grid.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
.panel {
  min-width: 0;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(12,19,29,.95);
  animation: rise .38s cubic-bezier(.2,.75,.25,1) both;
}
.panel-head {
  min-height: 50px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.panel-head h2 {
  margin: 0;
  color: var(--muted);
  font-size: 12px;
  font-weight: 950;
  letter-spacing: .1em;
  text-transform: uppercase;
}
.panel-head span {
  color: var(--muted);
  font-size: 12px;
}
.panel-body { padding: 14px; }
.stat {
  display: grid;
  gap: 5px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel);
  padding: 13px;
  cursor: pointer;
  min-width: 0;
}
.stat:hover,
.stat.active {
  border-color: var(--blue);
  background: rgba(54,183,255,.08);
}
.stat label {
  color: var(--muted);
  font-size: 10px;
  font-weight: 950;
  letter-spacing: .1em;
  text-transform: uppercase;
}
.stat b {
  font: 31px/1 "IBM Plex Mono", "SF Mono", monospace;
}
.stat small {
  color: var(--soft);
  overflow-wrap: anywhere;
}
.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  padding: 3px 8px;
  font-size: 10.5px;
  font-weight: 950;
  white-space: nowrap;
}
.ok { background: rgba(164,235,70,.14); color: #c7ff7e; }
.warn { background: rgba(255,208,94,.15); color: #ffdf86; }
.bad { background: rgba(255,104,78,.15); color: #ffa08f; }
.info { background: rgba(54,183,255,.15); color: #8edcff; }
.neutral { background: rgba(242,247,255,.08); color: #c0ccd8; }
.violet { background: rgba(169,140,255,.15); color: #cfc1ff; }
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
}
.chip {
  min-height: 30px;
  border: 1px solid var(--line-2);
  border-radius: 999px;
  background: var(--panel-2);
  color: var(--muted);
  padding: 0 10px;
  font-size: 12px;
  font-weight: 850;
  cursor: pointer;
}
.chip:hover,
.chip.active {
  color: #fff;
  border-color: var(--blue);
  background: rgba(54,183,255,.1);
}
.table-wrap { overflow: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 760px;
}
th {
  padding: 9px 12px;
  border-bottom: 1px solid var(--line);
  background: #090f16;
  color: var(--muted);
  text-align: left;
  font-size: 10px;
  font-weight: 950;
  letter-spacing: .08em;
  text-transform: uppercase;
}
td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
  vertical-align: middle;
}
tr.selectable { cursor: pointer; }
tr.selectable:hover td,
tr.selected td {
  background: rgba(54,183,255,.065);
}
.name {
  display: block;
  color: var(--ink);
  font-weight: 900;
}
.sub {
  display: block;
  margin-top: 2px;
  color: var(--muted);
  font-size: 11.5px;
}
.mono {
  font-family: "IBM Plex Mono", "SF Mono", monospace;
}
.railbar {
  width: 132px;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 3px;
}
.railbar span {
  height: 7px;
  border-radius: 999px;
  background: rgba(255,255,255,.08);
}
.railbar .pass { background: rgba(164,235,70,.52); }
.railbar .hold { background: rgba(255,208,94,.58); }
.railbar .fail { background: rgba(255,104,78,.58); }
.runway {
  position: relative;
  overflow-x: auto;
  display: grid;
  grid-template-columns: repeat(6, minmax(132px, 1fr));
  padding: 16px;
}
.runway:before {
  content: "";
  position: absolute;
  z-index: 3;
  left: 16px;
  right: 16px;
  top: 18px;
  height: 3px;
  border-radius: 999px;
  pointer-events: none;
  background: linear-gradient(90deg, transparent, rgba(54,183,255,.08), var(--blue), var(--cyan), transparent);
  filter: drop-shadow(0 0 10px rgba(54,183,255,.55));
  animation: trace 4s linear infinite;
}
.stage {
  position: relative;
  min-height: 142px;
  border: 1px solid var(--line);
  background: var(--panel-2);
  padding: 12px;
  cursor: pointer;
}
.stage:first-child { border-radius: 8px 0 0 8px; }
.stage:last-child { border-radius: 0 8px 8px 0; }
.stage:not(:last-child):after {
  content: "";
  position: absolute;
  right: -7px;
  top: 50%;
  z-index: 2;
  width: 12px;
  height: 12px;
  background: var(--panel-2);
  border-top: 1px solid var(--line);
  border-right: 1px solid var(--line);
  transform: translateY(-50%) rotate(45deg);
}
.stage:hover,
.stage.active {
  z-index: 4;
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(54,183,255,.08);
  transform: translateY(-2px);
}
.stage:before {
  content: "";
  display: block;
  height: 4px;
  margin-bottom: 10px;
  border-radius: 999px;
  background: var(--soft);
}
.stage.good:before { background: var(--green); }
.stage.warn:before { background: var(--yellow); }
.stage.bad:before { background: var(--red); }
.stage.info-stage:before { background: var(--blue); }
.stage h3 {
  margin: 0;
  font-size: 12px;
  font-weight: 950;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.stage b {
  display: block;
  margin: 8px 0 3px;
  font: 26px/1 "IBM Plex Mono", "SF Mono", monospace;
}
.stage p {
  margin: 0;
  color: var(--muted);
  font-size: 12px;
}
.mini-note {
  margin-top: 9px;
  padding: 6px;
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 6px;
  background: rgba(0,0,0,.13);
  color: var(--muted);
  font-size: 11.5px;
}
.card-list {
  display: grid;
  gap: 9px;
}
.card {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel-2);
  padding: 11px;
  cursor: pointer;
  min-width: 0;
}
.card:hover,
.card.selected {
  border-color: var(--blue);
  background: rgba(54,183,255,.08);
}
.card b {
  display: block;
  font-size: 13px;
  overflow-wrap: anywhere;
}
.card small {
  display: block;
  color: var(--muted);
  margin-top: 4px;
}
.badges {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 9px;
}
.flow {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}
.flow-step {
  min-height: 94px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel-2);
  padding: 11px;
  position: relative;
  overflow: hidden;
}
.flow-step.active {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(54,183,255,.08);
}
.flow-step.active:after {
  content: "";
  position: absolute;
  left: 10px;
  right: 10px;
  bottom: 10px;
  height: 3px;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--blue), var(--cyan), var(--green));
  background-size: 200% 100%;
  animation: flow 1.8s linear infinite;
}
.flow-step strong { display: block; }
.flow-step span { color: var(--muted); font-size: 12px; }
.form-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.field {
  display: grid;
  gap: 5px;
  min-width: 0;
}
.field label {
  color: var(--muted);
  font-size: 10.5px;
  font-weight: 950;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.field input,
.field select,
.field textarea {
  min-height: 36px;
  width: 100%;
  border: 1px solid var(--line-2);
  border-radius: 6px;
  background: var(--panel-2);
  color: var(--ink);
  padding: 0 10px;
  outline: none;
}
.field textarea {
  min-height: 84px;
  padding: 9px 10px;
  resize: vertical;
}
.check {
  display: flex;
  gap: 8px;
  align-items: center;
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: var(--panel-2);
  padding: 8px;
  color: var(--muted);
}
.log {
  display: grid;
  gap: 7px;
}
.log-line {
  display: grid;
  grid-template-columns: 78px 1fr auto;
  gap: 8px;
  align-items: start;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--panel-2);
  padding: 8px;
  color: var(--muted);
  font-size: 12px;
}
.timeline {
  display: grid;
  gap: 8px;
}
.event {
  display: grid;
  grid-template-columns: 9px 1fr auto;
  gap: 8px;
  align-items: start;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: var(--panel-2);
  padding: 9px;
  cursor: pointer;
}
.event:hover { border-color: var(--blue); }
.dot {
  width: 8px;
  height: 8px;
  margin-top: 5px;
  border-radius: 50%;
  background: var(--soft);
}
.dot.g { background: var(--green); }
.dot.y { background: var(--yellow); }
.dot.r { background: var(--red); }
.dot.b { background: var(--blue); }
.event b { display: block; font-size: 12.5px; }
.event small { color: var(--muted); }
.component-demo {
  display: grid;
  gap: 14px;
}
.token-row {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 8px;
}
.swatch {
  min-height: 70px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 9px;
  display: grid;
  align-content: end;
  color: #fff;
  font-size: 11px;
  font-weight: 900;
  box-shadow: inset 0 0 35px rgba(0,0,0,.22);
}
.empty {
  min-height: 180px;
  display: grid;
  place-items: center;
  text-align: center;
  border: 1px dashed var(--line-2);
  border-radius: var(--radius);
  background: rgba(255,255,255,.025);
  color: var(--muted);
  padding: 18px;
}
.inspector {
  position: sticky;
  top: 78px;
  height: calc(100vh - 92px);
  overflow: hidden;
  display: grid;
  grid-template-rows: auto auto auto 1fr auto;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #080d13;
}
.inspector.scan:after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 80px;
  pointer-events: none;
  background: linear-gradient(180deg, transparent, rgba(54,183,255,.26), transparent);
  animation: scan .62s ease;
}
.inspector-head {
  padding: 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  gap: 12px;
}
.target {
  padding: 14px;
  display: grid;
  grid-template-columns: 48px 1fr;
  gap: 11px;
  align-items: center;
}
.cube {
  width: 48px;
  height: 48px;
  border: 1px solid var(--line-2);
  border-radius: 9px;
  background: linear-gradient(160deg, rgba(54,183,255,.25), rgba(164,235,70,.08));
  box-shadow: inset 0 0 30px rgba(54,183,255,.08);
}
.target.scan .cube { animation: targetFlash .58s ease; }
.target h3 {
  margin: 0;
  font-size: 16px;
  overflow-wrap: anywhere;
}
.target span { color: var(--muted); font-size: 12px; }
.tabs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  padding: 0 14px 12px;
}
.tab {
  border: 1px solid var(--line);
  border-radius: 7px;
  background: var(--panel-2);
  color: var(--muted);
  padding: 7px 4px;
  font-size: 11px;
  font-weight: 950;
  cursor: pointer;
}
.tab:hover,
.tab.active {
  color: #fff;
  border-color: var(--blue);
}
.inspector-body {
  overflow: auto;
  padding: 0 14px 14px;
}
.kv {
  display: grid;
  grid-template-columns: 112px minmax(0, 1fr);
  gap: 7px 10px;
  font-size: 12.5px;
}
.kv dt { color: var(--muted); }
.kv dd { margin: 0; overflow-wrap: anywhere; }
.inspector-actions {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  padding: 14px;
  border-top: 1px solid var(--line);
}
.drawer {
  position: fixed;
  right: 18px;
  top: 78px;
  width: min(500px, calc(100vw - 36px));
  max-height: calc(100vh - 100px);
  overflow: auto;
  z-index: 80;
  border: 1px solid var(--line-2);
  border-radius: 10px;
  background: #080d13;
  box-shadow: 0 28px 90px rgba(0,0,0,.7);
  padding: 14px;
  transform: translateX(calc(100% + 28px));
  transition: transform .24s cubic-bezier(.2,.78,.2,1), box-shadow .24s ease;
}
.drawer.open {
  transform: translateX(0);
  box-shadow: 0 28px 90px rgba(0,0,0,.7), 0 0 0 1px rgba(54,183,255,.2), 0 0 44px rgba(54,183,255,.1);
}
.drawer-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.drawer h2 {
  margin: 0;
  color: var(--muted);
  font-size: 12px;
  font-weight: 950;
  letter-spacing: .1em;
  text-transform: uppercase;
}
.drawer-body {
  display: grid;
  gap: 10px;
  color: var(--muted);
}
.drawer.open .drawer-body > * { animation: drawerItem .28s ease both; }
.drawer.open .drawer-body > *:nth-child(1) { animation-delay: .03s; }
.drawer.open .drawer-body > *:nth-child(2) { animation-delay: .07s; }
.drawer.open .drawer-body > *:nth-child(3) { animation-delay: .11s; }
.drawer.open .drawer-body > *:nth-child(4) { animation-delay: .15s; }
.toast {
  position: fixed;
  left: 50%;
  bottom: 22px;
  z-index: 100;
  transform: translateX(-50%) translateY(80px);
  border: 1px solid var(--blue);
  border-radius: 999px;
  background: #07111a;
  color: #ddf6ff;
  box-shadow: 0 16px 48px rgba(0,0,0,.5);
  padding: 10px 14px;
  transition: transform .2s ease;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.packet {
  position: fixed;
  left: var(--x);
  top: var(--y);
  width: 10px;
  height: 10px;
  border-radius: 50%;
  z-index: 90;
  pointer-events: none;
  background: var(--blue);
  box-shadow: 0 0 20px rgba(54,183,255,.85), 0 0 0 5px rgba(54,183,255,.12);
  animation: packet .72s cubic-bezier(.18,.8,.25,1) forwards;
}
.filtered {
  opacity: .13;
  transform: scale(.986);
  filter: saturate(.46);
}
.blink { animation: targetFlash .5s ease; }
@keyframes rise {
  from { opacity: 0; transform: translateY(12px) scale(.992); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes pulse {
  70% { box-shadow: 0 0 0 10px rgba(164,235,70,0); }
}
@keyframes flow {
  0% { background-position: 0% 50%; }
  100% { background-position: 220% 50%; }
}
@keyframes trace {
  0% { transform: translateX(-30%); opacity: 0; }
  12%, 70% { opacity: 1; }
  100% { transform: translateX(130%); opacity: 0; }
}
@keyframes scan {
  0% { transform: translateY(-120%); opacity: 0; }
  18% { opacity: .9; }
  100% { transform: translateY(160%); opacity: 0; }
}
@keyframes drawerItem {
  from { opacity: 0; transform: translateX(14px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes targetFlash {
  0% { filter: brightness(1); }
  35% { filter: brightness(1.35); }
  100% { filter: brightness(1); }
}
@keyframes packet {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(.4); }
  20% { opacity: 1; }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(.95); }
}
@media (max-width: 1280px) {
  .layout { grid-template-columns: minmax(0, 1fr); }
  .rail {
    position: static;
    height: auto;
    display: flex;
    overflow: auto;
    padding-bottom: 2px;
  }
  .rail-group { display: flex; gap: 7px; }
  .rail-label { display: none; }
  .rail button { min-width: 86px; }
  .inspector { position: static; height: auto; }
  .screen-head { grid-template-columns: 1fr; }
}
@media (max-width: 820px) {
  .topbar { grid-template-columns: 1fr; padding: 10px; height: auto; }
  .layout { padding: 12px; }
  .grid.two,
  .grid.three,
  .grid.four,
  .flow,
  .form-grid,
  .token-row { grid-template-columns: 1fr; }
  .screen-head h1 { font-size: 25px; }
  .inspector-actions { grid-template-columns: 1fr; }
  .runway { grid-template-columns: 1fr; }
  .stage,
  .stage:first-child,
  .stage:last-child { border-radius: 8px; }
  .stage:not(:last-child):after { display: none; }
}
@media (prefers-reduced-motion: reduce) {
  *,
  *:before,
  *:after {
    animation: none !important;
    transition: none !important;
    scroll-behavior: auto !important;
  }
}
</style>
</head>

const $ = (s, root = document) => root.querySelector(s);
const $$ = (s, root = document) => Array.from(root.querySelectorAll(s));
const screen = $("#screen");
const navRail = $("#navRail");
const inspector = $("#inspector");

function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
  }[c]));
}
function clsForStatus(status) {
  const s = String(status || "").toLowerCase();
  if (["ok", "ready", "running", "complete", "compliant", "healthy", "published", "assigned", "uploaded", "attached", "stable"].includes(s)) return "ok";
  if (["warn", "warning", "pending", "sync", "syncing", "review", "draft", "verifying", "captured", "degraded"].includes(s)) return "warn";
  if (["bad", "error", "missing", "failed", "dead", "repair", "blocked", "delete accepted"].includes(s)) return "bad";
  if (["winpe", "clone", "web", "monitor", "cloud"].includes(s)) return "info";
  if (["ubuntu", "windows"].includes(s)) return "violet";
  return "neutral";
}
function badge(text, tone) {
  return `<span class="badge ${tone || clsForStatus(text)}">${esc(text)}</span>`;
}
function railbar(parts) {
  return `<div class="railbar">${parts.map(p => `<span class="${esc(p)}"></span>`).join("")}</div>`;
}
function panel(title, subtitle, body, action = "") {

        ${action}
      </div>
      ${body}
    </section>`;
}
function hero(title, copy, actions = "", meters = defaultMeters()) {

}
function defaultMeters() {

    ["Identity", 84],
    ["Cloud", 76],

  ].map(([name, val]) => `
    <div class="meter-row"><span>${name}</span><div class="meter"><i style="--w:${val}%"></i></div><b>${val}</b></div>
  `).join("");
}
function routeTitle() {
  return appState.routes.find(r => r.id === appState.route)?.title || "Cockpit";
}
function button(label, attrs = "", kind = "") {
  return `<button class="btn ${kind}" ${attrs}>${esc(label)}</button>`;
}
function toast(message) {
  const t = $("#toast");
  t.textContent = message;
  t.classList.add("show");
  clearTimeout(window.__toast);
  window.__toast = setTimeout(() => t.classList.remove("show"), 1600);
}
function packet(source) {
  const target = screen || document.body;
  if (!source || !target) return;
  const a = source.getBoundingClientRect();
  const b = target.getBoundingClientRect();
  const p = document.createElement("span");
  p.className = "packet";
  p.style.setProperty("--x", `${a.left + a.width / 2}px`);
  p.style.setProperty("--y", `${a.top + a.height / 2}px`);
  p.style.setProperty("--dx", `${b.left + b.width * .5 - a.left - a.width / 2}px`);
  p.style.setProperty("--dy", `${b.top + 30 - a.top - a.height / 2}px`);
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 760);
}
function selectedVm() {
  return appState.vms.find(v => v.id === appState.selectedId) || appState.vms[0];
}
function selectedJob() {

}
function selectedSequence() {

}
function selectedCloud() {

}
function getSelected() {
  if (appState.selectedKind === "job") return selectedJob();
  if (appState.selectedKind === "sequence") return selectedSequence();
  if (appState.selectedKind === "cloud") return selectedCloud();
  if (appState.selectedKind === "artifact") return appState.hashes.find(h => h.name === appState.selectedId) || appState.hashes[0];

}

}
function targetLabel(item) {

function rowTags(item) {
  return [
    item.lane, item.stage, item.status, item.os, item.path, item.state, item.type,

}
function filterButtons(filters) {

}
function applyCurrentFilter() {
  const q = (appState.query || "").toLowerCase();
  const f = appState.filter;
  let visible = 0;
  $$("[data-tags]").forEach(el => {
    const tags = el.dataset.tags || "";
    const matchesFilter = f === "all" || tags.includes(f);
    const matchesQuery = !q || el.innerText.toLowerCase().includes(q) || tags.includes(q);
    const show = matchesFilter && matchesQuery;
    el.classList.toggle("filtered", !show);
    if (el.tagName === "TR") el.style.display = show ? "" : "table-row";
    if (show) visible++;
  });
  const count = $("#visibleCount");
  if (count) count.textContent = `${visible} visible`;
}
function markSelections() {
  $$("[data-select-id]").forEach(el => {
    el.classList.toggle(
      "selected",
      el.dataset.selectKind === appState.selectedKind && el.dataset.selectId === String(appState.selectedId)
    );
  });
}

function renderNav() {
  const groups = {};
  appState.routes.forEach(r => {
    groups[r.group] ||= [];
    groups[r.group].push(r);
  });
  navRail.innerHTML = Object.entries(groups).map(([group, routes]) => `
    <div class="rail-group">
      <div class="rail-label">${esc(group)}</div>
      ${routes.map(r => `<button class="${appState.route === r.id ? "active" : ""}" data-route="${esc(r.id)}">${esc(r.label)}</button>`).join("")}
    </div>
  `).join("");
}

function renderRoute(route = appState.route) {
  appState.route = route;
  renderNav();
  const renderers = {
    dashboard: renderDashboard,
    provision: renderProvision,
    template: renderTemplate,
    sequences: renderSequences,
    fleet: renderFleet,
    device: renderDevice,
    jobs: renderJobs,
    monitoring: renderMonitoring,
    cloud: renderCloud,
    artifacts: renderArtifacts,
    settings: renderSettings,
    design: renderDesignSystem
  };
  screen.innerHTML = (renderers[appState.route] || renderDashboard)();
  renderInspector();
  bindRouteControls();
  applyCurrentFilter();
  markSelections();
}

function renderDashboard() {
  const ready = appState.vms.filter(v => v.lane === "ready").length;
  const attention = appState.vms.filter(v => v.lane === "repair").length;
  const runningJobs = appState.jobs.filter(j => j.status === "running").length;
  return `
    ${hero(
      "Operate the whole VM lifecycle from one tactical surface.",
      "This full-app prototype turns dashboard, build, fleet, jobs, monitoring, cloud cleanup, artifacts, and settings into one command-forward cockpit.",
      `${button("Provision strike", 'data-command="provision"', "primary")}
       ${button("Open monitoring", 'data-route="monitoring"')}
       ${button("Retire device", 'data-command="retire"', "danger")}`
    )}
    <section class="grid four">

function renderInspector() {
  const item = getSelected();
  const label = targetLabel(item);
  const meta = inspectorMeta(item);
  inspector.innerHTML = `
    <div class="inspector-head">
      <div><h2>Target inspector</h2><span class="micro">${esc(appState.selectedKind)} detail mode</span></div>
      ${badge(meta.state)}
    </div>
    <div class="target">
      <div class="cube"></div>
      <div><h3>${esc(label)}</h3><span>${esc(meta.sub)}</span></div>
    </div>
    <div class="tabs">
      ${["overview","build","cloud","logs"].map(t => `<button class="tab ${appState.inspectorTab === t ? "active" : ""}" data-tab="${t}">${esc(t)}</button>`).join("")}
    </div>
    <div class="inspector-body">${inspectorTab(item, appState.inspectorTab)}</div>
    <div class="inspector-actions">
      ${button("Console", 'data-command="console"')}
      ${button("Repair", 'data-command="repair"')}
      ${button("Sweep", 'data-command="sweep"')}
      ${button("Retire", 'data-command="retire"', "danger")}
    </div>`;
}
function inspectorMeta(item) {
  if (appState.selectedKind === "job") return { state: item.status, sub: `${item.type} / ${item.worker} / ${item.progress}%` };
  if (appState.selectedKind === "sequence") return { state: item.status, sub: `${item.os} / ${item.steps} steps / ${item.reboots} reboots` };
  if (appState.selectedKind === "cloud") return { state: item.deleteState || item.intune, sub: `${item.autopilot} / ${item.intune} / ${item.entra}` };
  if (appState.selectedKind === "artifact") return { state: item.state, sub: `${item.group} / ${item.age}` };
  return { state: item.stage, sub: `VMID ${item.vmid} / ${item.node} / ${item.os}` };
}
function inspectorTab(item, tab) {
  if (tab === "build") {
    return `<dl class="kv">
      <dt>Path</dt><dd>${badge(item.path || item.sequence || "clone")}</dd>
      <dt>Sequence</dt><dd>${esc(item.sequence || item.type || item.name || "none")}</dd>
      <dt>Progress</dt><dd>${item.progress !== undefined ? `<div class="meter"><i style="--w:${item.progress}%"></i></div>` : badge("not running", "neutral")}</dd>
      <dt>Worker</dt><dd>${esc(item.worker || "not assigned")}</dd>
    </dl>`;
  }
  if (tab === "cloud") {
    return `<dl class="kv">
      <dt>AD</dt><dd>${badge(item.ad || "n/a")}</dd>
      <dt>Entra</dt><dd>${badge(item.entra || "n/a")}</dd>
      <dt>Intune</dt><dd>${badge(item.intune || "n/a")}</dd>
      <dt>Compliance</dt><dd>${badge(item.compliance || item.deleteState || "n/a")}</dd>
    </dl>`;
  }
  if (tab === "logs") {
    const lines = item.events || [item.detail || "No live log attached", "Command drawer can stage next action", "Evidence stream would appear here"];
    return `<div class="mini-log log">${lines.map((l, i) => `<div class="log-line"><span class="mono">${i + 1}</span><span>${esc(l)}</span>${badge(i ? "info" : "ok")}</div>`).join("")}</div>`;
  }
  return `<dl class="kv">
    <dt>Type</dt><dd>${badge(appState.selectedKind, "info")}</dd>
    <dt>Name</dt><dd>${esc(targetLabel(item))}</dd>
    <dt>Status</dt><dd>${badge(inspectorMeta(item).state)}</dd>
    <dt>Meta</dt><dd>${esc(inspectorMeta(item).sub)}</dd>
  </dl>`;
}

function bindRouteControls() {
  $$("[data-route]").forEach(el => {
    el.onclick = e => {
      e.preventDefault();
      packet(el);
      setRoute(el.dataset.route);
    };
  });
  $$("[data-command]").forEach(el => {
    el.onclick = e => {
      e.preventDefault();
      packet(el);
      if (el.dataset.vmid) select("vm", el.dataset.vmid);
      if (el.dataset.command === "scan") {
        inspector.classList.remove("scan");
        void inspector.offsetWidth;
        inspector.classList.add("scan");
        toast("Inspector scan replayed");
        return;
      }
      commandDrawer(el.dataset.command);
    };
  });
  $$("[data-select-kind]").forEach(el => {
    el.onclick = e => {
      if (e.target.closest("[data-command]")) return;
      packet(el);
      select(el.dataset.selectKind, el.dataset.selectId);
    };
  });
  $$("[data-filter]").forEach(el => {
    el.onclick = e => {
      e.preventDefault();
      appState.filter = el.dataset.filter;
      $$(".chip").forEach(c => c.classList.toggle("active", c.dataset.filter === appState.filter));
      packet(el);
      applyCurrentFilter();
      toast(`Filter ${appState.filter}`);
    };
  });
  $$("[data-drawer]").forEach(el => {
    el.onclick = e => {
      e.preventDefault();
      const [title, body] = el.dataset.drawer.split("|");
      packet(el);
      openDrawer(title, `<p>${esc(body || "Command detail")}</p>${button("Queue as job", `data-action="${esc(title)} queued"`, "primary")}`);
    };
  });
}

document.addEventListener("click", e => {
  const railRoute = e.target.closest("#navRail [data-route]");
  if (railRoute) {
    e.preventDefault();
    packet(railRoute);
    setRoute(railRoute.dataset.route);
    return;
  }
  const commandTarget = e.target.closest("[data-command]");
  if (commandTarget) {
    e.preventDefault();
    packet(commandTarget);
    if (commandTarget.dataset.vmid) select("vm", commandTarget.dataset.vmid);
    if (commandTarget.dataset.command === "scan") {
      inspector.classList.remove("scan");
      void inspector.offsetWidth;
      inspector.classList.add("scan");
      toast("Inspector scan replayed");
      return;
    }
    commandDrawer(commandTarget.dataset.command);
    return;
  }
  const action = e.target.closest("[data-action]");
  if (action) {
    e.preventDefault();
    toast(action.dataset.action);
  }
  const retire = e.target.closest("[data-retire-confirm]");
  if (retire) {
    e.preventDefault();
    const value = ($("#retireConfirm")?.value || "").trim();
    if (value !== "RETIRE") {
      toast("Type RETIRE to arm destructive mock action");
      return;
    }
    toast("Retire verification job staged");
    closeDrawer();
  }
  const tab = e.target.closest("[data-tab]");
  if (tab) {
    e.preventDefault();
    appState.inspectorTab = tab.dataset.tab;
    renderInspector();
  }
});
$("#drawerClose").onclick = closeDrawer;
document.addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k") {
    e.preventDefault();
    search.focus();
  }
  if (e.key === "Escape") closeDrawer();
});
search.addEventListener("input", e => {
  appState.query = e.target.value;
  const q = appState.query.toLowerCase().trim();
  const routeHit = appState.routes.find(r => q && (r.label.toLowerCase() === q || r.title.toLowerCase().includes(q)));
  if (routeHit && q.length > 3) {
    toast(`Route available: ${routeHit.title}`);
  }
  applyCurrentFilter();
});
let sec = 899;
setInterval(() => {
  sec = sec <= 0 ? 899 : sec - 1;
  const m = String(Math.floor(sec / 60)).padStart(2, "0");
  const s = String(sec % 60).padStart(2, "0");
  $("#countdown").textContent = `${m}:${s}`;
  appState.readiness = 82 + Math.round(Math.sin(Date.now() / 1800) * 2);
  const score = $("#readinessScore");
  if (score) score.textContent = appState.readiness;
}, 1000);

renderRoute();
</script>
